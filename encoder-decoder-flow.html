<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Encoder-Decoder: Training Phase</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #08080d; display: flex; justify-content: center; padding: 20px 10px 60px; }
  .wrap { max-width: 1100px; width: 100%; }
  h1 { text-align: center; color: #80deea; font-family: sans-serif; font-size: 22px; margin-bottom: 4px; }
  .sub { text-align: center; color: rgba(255,255,255,0.35); font-family: sans-serif; font-size: 13px; margin-bottom: 16px; }
</style>
</head>
<body>
<div class="wrap">
<h1>Encoder-Decoder Transformer: Training Phase</h1>
<p class="sub">"The cat sat on the mat" - every vector, every layer, every matrix multiply</p>
<svg id="nn" width="100%" viewBox="0 0 1080 5800" style="display:block;">
<defs>
  <marker id="ah" markerWidth="6" markerHeight="4" refX="5" refY="2" orient="auto">
    <polygon points="0 0,6 2,0 4" fill="rgba(255,255,255,0.25)"/>
  </marker>
</defs>
</svg>
</div>

<script>
const svg = document.getElementById('nn');
const NS = 'http://www.w3.org/2000/svg';

// ── Tokens ──
const tokens = [
  { name: '"The"',  id: 1042, cx: 100,  color: '#f44336', light: '#ef9a9a', bg: 'rgba(244,67,54,' },
  { name: '"cat"',  id: 5829, cx: 280,  color: '#ffc107', light: '#ffe082', bg: 'rgba(255,193,7,' },
  { name: '"sat"',  id: 3820, cx: 460,  color: '#4caf50', light: '#80e8a5', bg: 'rgba(76,175,80,' },
  { name: '"on"',   id: 322,  cx: 640,  color: '#00bcd4', light: '#80deea', bg: 'rgba(0,188,212,' },
  { name: '"the"',  id: 1042, cx: 820,  color: '#9c27b0', light: '#ce93d8', bg: 'rgba(156,39,176,' },
  { name: '"mat"',  id: 9382, cx: 980,  color: '#ff9800', light: '#ffb74d', bg: 'rgba(255,152,0,' },
];
const N = tokens.length;
const R = 12;
const DX = 24;
const dimOffsets = [-DX, 0, DX];

// ── Helpers ──
function el(tag, attrs, parent = svg) {
  const e = document.createElementNS(NS, tag);
  for (const [k, v] of Object.entries(attrs)) e.setAttribute(k, v);
  parent.appendChild(e);
  return e;
}

function node(cx, cy, fill, stroke, lbl, lblColor, r = R) {
  el('circle', { cx, cy, r, fill, stroke, 'stroke-width': 1.5 });
  if (lbl !== undefined && lbl !== '') el('text', { x: cx, y: cy + 4, fill: lblColor || '#fff', 'font-size': r > 10 ? 9 : 7, 'text-anchor': 'middle', 'font-family': 'monospace', 'font-weight': '600' }).textContent = lbl;
}

function edge(x1, y1, x2, y2, color = 'rgba(255,255,255,0.08)', width = 1) {
  el('line', { x1, y1, x2, y2, stroke: color, 'stroke-width': width });
}

function label(x, y, text, color = 'rgba(255,255,255,0.4)', size = 12, weight = '600', anchor = 'middle') {
  el('text', { x, y, fill: color, 'font-size': size, 'text-anchor': anchor, 'font-weight': weight, 'font-family': 'sans-serif' }).textContent = text;
}

function sectionBox(x, y, w, h, color = 'rgba(255,255,255,0.06)', strokeColor = 'rgba(255,255,255,0.1)') {
  el('rect', { x, y, width: w, height: h, rx: 12, fill: color, stroke: strokeColor, 'stroke-width': 1.5, 'stroke-dasharray': '6,4' });
}

function layerLabel(y, text, color) {
  const w = Math.max(220, text.length * 7.2 + 30);
  const x = 540 - w / 2;
  el('rect', { x, y: y - 12, width: w, height: 22, rx: 6, fill: '#08080d', stroke: color || 'rgba(255,255,255,0.15)', 'stroke-width': 1 });
  label(540, y + 3, text, color || 'rgba(255,255,255,0.45)', 11, '700');
}

function tokenNodes(tok, y) {
  return dimOffsets.map(dx => ({ x: tok.cx + dx, y }));
}

function fcEdges(fromNodes, toNodes, color, width = 0.8) {
  for (const f of fromNodes) for (const t of toNodes) edge(f.x, f.y + R, t.x, t.y - R, color, width);
}

function oneToOneEdges(fromNodes, toNodes, color, width = 1) {
  for (let i = 0; i < fromNodes.length; i++) edge(fromNodes[i].x, fromNodes[i].y + R, toNodes[i].x, toNodes[i].y - R, color, width);
}

// Annotation callout pill
function callout(x, y, text, color = 'rgba(0,188,212,0.7)', bgColor = 'rgba(0,188,212,0.06)') {
  const w = text.length * 6 + 24;
  el('rect', { x: x - w/2, y: y - 11, width: w, height: 20, rx: 10, fill: bgColor, stroke: color, 'stroke-width': 0.8 });
  label(x, y + 3, text, color, 10, '600');
}

function parallelBadge(y, text = 'ALL 6 VECTORS IN PARALLEL (one matrix multiply)') {
  callout(540, y, text, 'rgba(0,230,118,0.7)', 'rgba(0,230,118,0.06)');
}

// Explanation box (wider, multi-line callout)
function explainBox(x, y, w, lines, borderColor = 'rgba(255,152,0,0.4)', bgColor = 'rgba(255,152,0,0.03)') {
  const h = lines.length * 18 + 16;
  el('rect', { x: x - w/2, y: y - 6, width: w, height: h, rx: 8, fill: bgColor, stroke: borderColor, 'stroke-width': 1 });
  lines.forEach((line, i) => {
    const [text, color, sz, wt] = Array.isArray(line) ? line : [line, 'rgba(255,255,255,0.4)', 10, '400'];
    label(x, y + 12 + i * 18, text, color, sz || 10, wt || '400');
  });
  return h;
}

let Y = 30;

// ════════════════════════════════════
// TITLE BOX: MODE INDICATOR
// ════════════════════════════════════
el('rect', { x: 200, y: Y - 12, width: 680, height: 60, rx: 10, fill: 'rgba(0,230,118,0.03)', stroke: 'rgba(0,230,118,0.2)', 'stroke-width': 1.5 });
label(540, Y + 6, 'TRAINING / PREFILL MODE', 'rgba(0,230,118,0.7)', 16, '700');
label(540, Y + 24, 'All tokens flow as one matrix through every layer simultaneously.', 'rgba(0,230,118,0.5)', 11, '600');
label(540, Y + 40, 'See encoder-decoder-inference.html for the production (generation) phase.', 'rgba(255,255,255,0.25)', 10, '400');

// ════════════════════════════════════
// STEP 0: RAW INPUT
// ════════════════════════════════════
Y += 76;
label(540, Y, 'Step 0: Raw Input String', 'rgba(255,255,255,0.5)', 14, '700');
Y += 24;
el('rect', { x: 170, y: Y - 14, width: 740, height: 28, rx: 8, fill: 'rgba(255,255,255,0.03)', stroke: 'rgba(255,255,255,0.1)', 'stroke-width': 1 });
label(540, Y + 4, '"The cat sat on the mat"', '#80deea', 16, '700');

// ════════════════════════════════════
// STEP 1: TOKENIZATION
// ════════════════════════════════════
Y += 52;
label(540, Y, 'Step 1: Tokenization (lookup table, no neural network)', 'rgba(255,255,255,0.5)', 14, '700');
Y += 12;
label(540, Y, 'Split text into tokens, map each to an integer ID', 'rgba(255,255,255,0.25)', 11, '400');
Y += 36;
const tokY = Y;
for (const tok of tokens) {
  label(tok.cx, Y - 18, tok.name, tok.light, 12, '700');
  el('rect', { x: tok.cx - 22, y: Y - 10, width: 44, height: 22, rx: 6, fill: tok.bg + '0.1)', stroke: tok.color, 'stroke-width': 1 });
  label(tok.cx, Y + 5, 'ID:' + tok.id, tok.light, 9, '600');
}
callout(540, Y + 32, 'Each word becomes one integer. Nothing neural yet.');

// ════════════════════════════════════
// STEP 2: EMBEDDING LOOKUP
// ════════════════════════════════════
Y += 72;
label(540, Y, 'Step 2: Embedding Lookup (one matrix row per token)', 'rgba(255,255,255,0.5)', 14, '700');
Y += 12;
label(540, Y, 'Each token ID selects a row from the embedding matrix (learned during training)', 'rgba(255,255,255,0.25)', 11, '400');
Y += 36;
const embY = Y;
const embVecs = [
  [0.21, -0.87, 0.45],
  [0.62, 0.34, -0.18],
  [-0.55, 0.91, 0.12],
  [0.08, -0.43, 0.77],
  [0.21, -0.87, 0.45],
  [0.73, 0.15, -0.61],
];
for (let t = 0; t < N; t++) {
  const tok = tokens[t];
  edge(tok.cx, tokY + 12, tok.cx, embY - R - 4, tok.bg + '0.2)', 1);
  dimOffsets.forEach((dx, i) => {
    node(tok.cx + dx, embY, tok.bg + '0.15)', tok.color, embVecs[t][i], tok.light);
  });
}
parallelBadge(Y + 28, 'ALL 6 lookups happen at once - just row selection from a table');
label(540, Y + 44, '"The" (ID 1042) and "the" (ID 1042) get the SAME embedding - same word, same row', 'rgba(255,255,255,0.2)', 9, '400');

// ════════════════════════════════════
// STEP 3: POSITIONAL ENCODING
// ════════════════════════════════════
Y += 78;
label(540, Y, 'Step 3: Add Positional Encoding (pure math, not learned)', 'rgba(255,255,255,0.5)', 14, '700');
Y += 12;
label(540, Y, 'sin/cos values based on position index, added element-wise to embeddings', 'rgba(255,255,255,0.25)', 11, '400');
Y += 36;
const posY = Y;
const posVecs = [
  [0.21, -0.87, 1.45],
  [1.47, 0.34, -0.17],
  [-0.46, 0.91, 0.13],
  [0.16, -0.43, 1.77],
  [0.30, -0.87, 0.46],
  [1.58, 0.15, -0.60],
];
for (let t = 0; t < N; t++) {
  const tok = tokens[t];
  oneToOneEdges(tokenNodes(tok, embY), tokenNodes(tok, posY), tok.bg + '0.2)', 1);
  dimOffsets.forEach((dx, i) => {
    node(tok.cx + dx, posY, tok.bg + '0.15)', tok.color, posVecs[t][i], tok.light);
  });
}
parallelBadge(Y + 28, 'ALL 6 additions happen at once - element-wise, no dependencies');
label(540, Y + 44, '"The" (pos 0) = [0.21,-0.87,1.45] vs "the" (pos 4) = [0.30,-0.87,0.46] - now different!', 'rgba(255,255,255,0.2)', 9, '400');

// ════════════════════════════════════
// ENCODER BLOCK
// ════════════════════════════════════
Y += 76;
const encBlockY = Y;
sectionBox(20, Y, 1040, 1380, 'rgba(0,188,212,0.02)', 'rgba(0,188,212,0.15)');
label(540, Y + 22, 'ENCODER BLOCK (x6 in original Transformer, x96 in GPT-scale)', '#80deea', 14, '700');
Y += 16;
label(540, Y + 22, 'Input: 6x512 matrix (6 tokens, each a 512-dim vector). Shown as 6x3 for clarity.', 'rgba(255,255,255,0.25)', 11, '400');

// ════════════════════════════════════
// ENCODER SELF-ATTENTION
// ════════════════════════════════════
Y += 48;
sectionBox(40, Y, 1000, 720, 'rgba(244,67,54,0.02)', 'rgba(244,67,54,0.1)');
label(540, Y + 20, 'Encoder Self-Attention (bidirectional - NO causal mask)', '#ef9a9a', 13, '700');
Y += 14;
label(540, Y + 20, 'Every token can attend to EVERY other token (including future ones)', 'rgba(255,255,255,0.25)', 11, '400');

// W_Q
Y += 48;
layerLabel(Y, 'x W_Q (learned) -> Query vectors', '#ef9a9a');
Y += 34;
const qY = Y;
const qVecs = [[0.7,1.5,1.1],[0.5,0.3,0.8],[-0.3,0.9,0.1],[0.1,-0.4,0.7],[0.6,1.4,1.0],[0.8,0.2,-0.5]];
for (let t = 0; t < N; t++) {
  fcEdges(tokenNodes(tokens[t], posY), tokenNodes(tokens[t], qY), 'rgba(244,67,54,0.08)', 0.5);
  dimOffsets.forEach((dx, i) => node(tokens[t].cx + dx, qY, 'rgba(244,67,54,0.12)', '#f44336', qVecs[t][i], '#ef9a9a'));
}
parallelBadge(Y + 24, 'Q = X * W_Q  (one matrix multiply: 6x3 * 3x3 = 6x3)');

// W_K
Y += 56;
layerLabel(Y, 'x W_K (learned) -> Key vectors', '#ffe082');
Y += 34;
const kY = Y;
const kVecs = [[0.9,2.4,0.1],[0.4,0.5,0.6],[-0.2,0.8,0.3],[0.3,-0.3,0.5],[0.8,2.3,0.0],[0.5,0.1,-0.4]];
for (let t = 0; t < N; t++) {
  fcEdges(tokenNodes(tokens[t], posY), tokenNodes(tokens[t], kY), 'rgba(255,193,7,0.06)', 0.5);
  dimOffsets.forEach((dx, i) => node(tokens[t].cx + dx, kY, 'rgba(255,193,7,0.12)', '#ffc107', kVecs[t][i], '#ffe082'));
}
parallelBadge(Y + 24, 'K = X * W_K  (one matrix multiply: 6x3 * 3x3 = 6x3)');

// W_V
Y += 56;
layerLabel(Y, 'x W_V (learned) -> Value vectors', '#80e8a5');
Y += 34;
const vY = Y;
const vVecs = [[1.4,0.6,1.5],[0.8,0.3,0.9],[-0.4,0.7,0.2],[0.2,-0.5,0.8],[1.3,0.5,1.4],[0.9,0.2,-0.3]];
for (let t = 0; t < N; t++) {
  fcEdges(tokenNodes(tokens[t], posY), tokenNodes(tokens[t], vY), 'rgba(76,175,80,0.06)', 0.5);
  dimOffsets.forEach((dx, i) => node(tokens[t].cx + dx, vY, 'rgba(76,175,80,0.12)', '#4caf50', vVecs[t][i], '#80e8a5'));
}
parallelBadge(Y + 24, 'V = X * W_V  (one matrix multiply: 6x3 * 3x3 = 6x3)');

// Q * K^T
Y += 56;
layerLabel(Y, 'Q . K^T -> Attention Scores (every token to every token)', 'rgba(255,255,255,0.5)');
Y += 14;
label(540, Y, 'NO causal mask in encoder - "The" can look at "mat", "sat" can look at "cat"', 'rgba(244,67,54,0.4)', 10, '600');

for (let qi = 0; qi < N; qi++) {
  for (let ki = 0; ki < N; ki++) {
    const opacity = qi === ki ? 0.2 : 0.06;
    const w = qi === ki ? 0.8 : 0.4;
    for (const qn of tokenNodes(tokens[qi], qY))
      for (const kn of tokenNodes(tokens[ki], kY))
        edge(qn.x, qn.y + R, kn.x, kn.y - R, tokens[qi].bg + opacity + ')', w);
  }
}

// Softmax + weighted V
Y += 34;
layerLabel(Y, 'Scale by 1/sqrt(d_k), Softmax, Weighted Sum of V', 'rgba(0,188,212,0.6)');
Y += 34;
const attnOutY = Y;
const attnOutVecs = [[1.2,0.5,1.3],[0.9,0.4,0.8],[-0.3,0.6,0.3],[0.3,-0.4,0.7],[1.1,0.4,1.2],[0.8,0.1,-0.2]];
for (let t = 0; t < N; t++) {
  for (let v = 0; v < N; v++) {
    const opacity = v === t ? 0.2 : 0.04;
    const w = v === t ? 1.0 : 0.3;
    for (let d = 0; d < 3; d++)
      edge(tokens[v].cx + dimOffsets[d], vY + R, tokens[t].cx + dimOffsets[d], attnOutY - R, tokens[t].bg + opacity + ')', w);
  }
  dimOffsets.forEach((dx, i) => node(tokens[t].cx + dx, attnOutY, tokens[t].bg + '0.15)', tokens[t].color, attnOutVecs[t][i], tokens[t].light));
}
parallelBadge(Y + 24, 'Attention(Q,K,V) = softmax(QK^T / sqrt(d_k)) * V');

// W_O
Y += 56;
layerLabel(Y, 'x W_O (learned) -> Multi-Head Output', '#b8a9ff');
Y += 34;
const woY = Y;
const woVecs = [[0.8,-0.3,1.2],[0.5,-0.1,0.6],[-0.2,0.4,0.2],[0.2,-0.3,0.5],[0.7,-0.2,1.1],[0.5,0.0,-0.1]];
for (let t = 0; t < N; t++) {
  fcEdges(tokenNodes(tokens[t], attnOutY), tokenNodes(tokens[t], woY), 'rgba(156,120,255,0.08)', 0.5);
  dimOffsets.forEach((dx, i) => node(tokens[t].cx + dx, woY, 'rgba(156,120,255,0.12)', '#9c78ff', woVecs[t][i], '#b8a9ff'));
}

// ════════════════════════════════════
// ADD & NORM 1
// ════════════════════════════════════
Y += 56;
layerLabel(Y, 'Add & LayerNorm (residual + normalize)', '#ffb74d');
Y += 34;
const an1Y = Y;
const an1Vecs = [[-1.1,0.1,1.0],[-0.9,0.0,0.9],[-0.8,-0.2,1.0],[-0.7,0.1,0.6],[-1.0,0.0,1.0],[-0.6,-0.1,0.7]];
for (let t = 0; t < N; t++) {
  const side = tokens[t].cx + 38;
  el('path', {
    d: `M ${side},${posY + R + 2} L ${side + 8},${posY + R + 8} L ${side + 8},${an1Y - R - 8} L ${side},${an1Y - R - 2}`,
    fill: 'none', stroke: tokens[t].bg + '0.12)', 'stroke-width': 1.2, 'stroke-dasharray': '4,3'
  });
}
for (let t = 0; t < N; t++) {
  oneToOneEdges(tokenNodes(tokens[t], woY), tokenNodes(tokens[t], an1Y), tokens[t].bg + '0.2)', 1);
  dimOffsets.forEach((dx, i) => node(tokens[t].cx + dx, an1Y, 'rgba(255,152,0,0.12)', '#ff9800', an1Vecs[t][i], '#ffb74d'));
}
parallelBadge(Y + 24, 'LayerNorm(X + Attention(X)) - applied independently per vector, all at once');

// ════════════════════════════════════
// ENCODER FFN
// ════════════════════════════════════
Y += 56;
sectionBox(40, Y, 1000, 280, 'rgba(100,149,237,0.02)', 'rgba(100,149,237,0.1)');
label(540, Y + 20, 'Feed-Forward Network (FFN)', '#90caf9', 13, '700');
Y += 14;
label(540, Y + 20, 'Same weights applied to EACH vector independently. No cross-token mixing.', 'rgba(255,255,255,0.25)', 10, '400');
Y += 12;
label(540, Y + 20, 'All 6 go through simultaneously as a batched matrix multiply.', 'rgba(0,230,118,0.4)', 10, '600');

Y += 42;
layerLabel(Y, 'FFN Layer 1: 3 -> 6 dims + ReLU (expand)', '#90caf9');
Y += 34;
const ffn1Y = Y;
const ffnDX = [-36, -22, -7, 7, 22, 36];
for (let t = 0; t < N; t++) {
  const from = tokenNodes(tokens[t], an1Y);
  for (const fn of from) for (const dx of ffnDX) edge(fn.x, fn.y + R, tokens[t].cx + dx, ffn1Y - 8, 'rgba(100,149,237,0.06)', 0.4);
  for (const dx of ffnDX) node(tokens[t].cx + dx, ffn1Y, 'rgba(100,149,237,0.12)', 'rgba(100,149,237,0.5)', '', '', 8);
}

Y += 48;
layerLabel(Y, 'FFN Layer 2: 6 -> 3 dims (compress back)', '#90caf9');
Y += 34;
const ffn2Y = Y;
const ffn2Vecs = [[0.5,-0.3,0.9],[0.3,-0.1,0.4],[-0.1,0.3,0.1],[0.1,-0.2,0.4],[0.4,-0.2,0.8],[0.3,0.0,-0.1]];
for (let t = 0; t < N; t++) {
  const to = tokenNodes(tokens[t], ffn2Y);
  for (const dx of ffnDX) for (const tn of to) edge(tokens[t].cx + dx, ffn1Y + 8, tn.x, ffn2Y - R, 'rgba(100,149,237,0.06)', 0.4);
  dimOffsets.forEach((dx, i) => node(tokens[t].cx + dx, ffn2Y, 'rgba(100,149,237,0.12)', 'rgba(100,149,237,0.6)', ffn2Vecs[t][i], '#90caf9'));
}

// ════════════════════════════════════
// ADD & NORM 2
// ════════════════════════════════════
Y += 56;
layerLabel(Y, 'Add & LayerNorm (residual + normalize)', '#ffb74d');
Y += 34;
const an2Y = Y;
const an2Vecs = [[-0.8,-0.5,1.3],[-0.7,-0.3,1.0],[-0.5,-0.1,0.6],[-0.4,0.0,0.4],[-0.7,-0.4,1.1],[-0.3,-0.1,0.4]];
for (let t = 0; t < N; t++) {
  const side = tokens[t].cx - 38;
  el('path', {
    d: `M ${side},${an1Y + R + 2} L ${side - 8},${an1Y + R + 8} L ${side - 8},${an2Y - R - 8} L ${side},${an2Y - R - 2}`,
    fill: 'none', stroke: tokens[t].bg + '0.12)', 'stroke-width': 1.2, 'stroke-dasharray': '4,3'
  });
}
for (let t = 0; t < N; t++) {
  oneToOneEdges(tokenNodes(tokens[t], ffn2Y), tokenNodes(tokens[t], an2Y), tokens[t].bg + '0.2)', 1);
  dimOffsets.forEach((dx, i) => node(tokens[t].cx + dx, an2Y, 'rgba(255,152,0,0.12)', '#ff9800', an2Vecs[t][i], '#ffb74d'));
}

// ════════════════════════════════════
// ENCODER OUTPUT
// ════════════════════════════════════
Y += 56;
el('rect', { x: 60, y: Y - 8, width: 960, height: 70, rx: 10, fill: 'rgba(0,188,212,0.04)', stroke: 'rgba(0,188,212,0.3)', 'stroke-width': 1.5 });
label(540, Y + 12, 'ENCODER OUTPUT: 6 context-enriched vectors (6x512 matrix)', '#80deea', 14, '700');
label(540, Y + 30, 'These become K and V for the decoder cross-attention. Computed ONCE, reused every decoder step.', 'rgba(255,255,255,0.3)', 10, '400');
label(540, Y + 46, 'Each vector now "knows" about all other words thanks to bidirectional self-attention.', 'rgba(0,188,212,0.5)', 10, '600');
const encOutY = an2Y;

// ════════════════════════════════════
// DECODER BLOCK
// ════════════════════════════════════
Y += 100;
const decBlockY = Y;
sectionBox(20, Y, 1040, 2000, 'rgba(156,120,255,0.02)', 'rgba(156,120,255,0.15)');
label(540, Y + 22, 'DECODER BLOCK (x6 in original Transformer)', '#b8a9ff', 14, '700');
Y += 16;
label(540, Y + 22, 'During TRAINING: all decoder tokens processed in parallel (teacher forcing).', 'rgba(0,230,118,0.5)', 11, '600');
Y += 14;
label(540, Y + 22, 'Showing decoder input: <s> The cat - predicting next token at each position.', 'rgba(255,255,255,0.25)', 11, '400');

// Decoder tokens
Y += 52;
label(540, Y, 'Decoder Input (target sequence, shifted right, + positional encoding)', 'rgba(255,255,255,0.45)', 12, '700');
Y += 30;
const decTokens = [
  { name: '"<s>"', cx: 260, color: '#78909c', light: '#b0bec5', bg: 'rgba(120,144,156,' },
  { name: '"The"',  cx: 540, color: '#e91e63', light: '#f48fb1', bg: 'rgba(233,30,99,' },
  { name: '"cat"', cx: 820, color: '#ffc107', light: '#ffe082', bg: 'rgba(255,193,7,' },
];
const decN = decTokens.length;
const decTokY = Y;
const decPosVecs = [
  [0.50, -0.10, 0.80],
  [0.95, 0.42, -0.31],
  [1.47, 0.34, -0.17],
];
for (let t = 0; t < decN; t++) {
  const tok = decTokens[t];
  label(tok.cx, Y - 18, tok.name, tok.light, 12, '700');
  dimOffsets.forEach((dx, i) => node(tok.cx + dx, Y, tok.bg + '0.15)', tok.color, decPosVecs[t][i], tok.light));
}
callout(540, Y + 28, 'Already embedded + positional encoding applied');

// ════════════════════════════════════
// DECODER MASKED SELF-ATTENTION
// ════════════════════════════════════
Y += 60;
sectionBox(40, Y, 1000, 600, 'rgba(233,30,99,0.02)', 'rgba(233,30,99,0.1)');
label(540, Y + 20, 'Masked Self-Attention (causal - can only look backward)', '#f48fb1', 13, '700');
Y += 14;
label(540, Y + 20, '"cat" can see "<s>" and "The", but NOT future tokens. Prevents cheating during training.', 'rgba(255,255,255,0.25)', 10, '400');

// Decoder Q
Y += 48;
layerLabel(Y, 'x W_Q -> Decoder Query', '#f48fb1');
Y += 34;
const dqY = Y;
const dqVecs = [[0.3,-0.1,0.5],[0.6,0.3,0.2],[0.4,0.2,0.6]];
for (let t = 0; t < decN; t++) {
  fcEdges(tokenNodes(decTokens[t], decTokY), tokenNodes(decTokens[t], dqY), 'rgba(233,30,99,0.08)', 0.5);
  dimOffsets.forEach((dx, i) => node(decTokens[t].cx + dx, dqY, 'rgba(233,30,99,0.12)', '#e91e63', dqVecs[t][i], '#f48fb1'));
}

// Decoder K
Y += 50;
layerLabel(Y, 'x W_K -> Decoder Key', '#ffe082');
Y += 34;
const dkY = Y;
const dkVecs = [[0.4,0.0,0.3],[0.7,0.2,0.1],[0.3,0.4,0.5]];
for (let t = 0; t < decN; t++) {
  fcEdges(tokenNodes(decTokens[t], decTokY), tokenNodes(decTokens[t], dkY), 'rgba(255,193,7,0.06)', 0.5);
  dimOffsets.forEach((dx, i) => node(decTokens[t].cx + dx, dkY, 'rgba(255,193,7,0.12)', '#ffc107', dkVecs[t][i], '#ffe082'));
}

// Decoder V
Y += 50;
layerLabel(Y, 'x W_V -> Decoder Value', '#80e8a5');
Y += 34;
const dvY = Y;
const dvVecs = [[0.5,-0.2,0.6],[0.8,0.1,0.4],[0.6,0.3,0.7]];
for (let t = 0; t < decN; t++) {
  fcEdges(tokenNodes(decTokens[t], decTokY), tokenNodes(decTokens[t], dvY), 'rgba(76,175,80,0.06)', 0.5);
  dimOffsets.forEach((dx, i) => node(decTokens[t].cx + dx, dvY, 'rgba(76,175,80,0.12)', '#4caf50', dvVecs[t][i], '#80e8a5'));
}

// Causal attention edges
Y += 24;
layerLabel(Y, 'Q . K^T with CAUSAL MASK (lower triangle only)', 'rgba(255,255,255,0.5)');
for (const qn of tokenNodes(decTokens[0], dqY))
  for (const kn of tokenNodes(decTokens[0], dkY))
    edge(qn.x, qn.y + R, kn.x, kn.y - R, 'rgba(120,144,156,0.15)', 0.6);
for (const qn of tokenNodes(decTokens[1], dqY)) {
  for (const kn of tokenNodes(decTokens[0], dkY))
    edge(qn.x, qn.y + R, kn.x, kn.y - R, 'rgba(233,30,99,0.06)', 0.4);
  for (const kn of tokenNodes(decTokens[1], dkY))
    edge(qn.x, qn.y + R, kn.x, kn.y - R, 'rgba(233,30,99,0.15)', 0.6);
}
for (const qn of tokenNodes(decTokens[2], dqY)) {
  for (const kn of tokenNodes(decTokens[0], dkY))
    edge(qn.x, qn.y + R, kn.x, kn.y - R, 'rgba(255,193,7,0.04)', 0.3);
  for (const kn of tokenNodes(decTokens[1], dkY))
    edge(qn.x, qn.y + R, kn.x, kn.y - R, 'rgba(255,193,7,0.08)', 0.4);
  for (const kn of tokenNodes(decTokens[2], dkY))
    edge(qn.x, qn.y + R, kn.x, kn.y - R, 'rgba(255,193,7,0.15)', 0.6);
}

// Softmax + weighted V
Y += 34;
layerLabel(Y, 'Softmax + Weighted Sum of V', 'rgba(0,188,212,0.6)');
Y += 34;
const dattnOutY = Y;
const dattnVecs = [[0.5,-0.2,0.6],[0.7,0.0,0.5],[0.6,0.1,0.6]];
for (let t = 0; t < decN; t++) {
  for (let v = 0; v <= t; v++) {
    const opacity = v === t ? 0.2 : 0.05;
    const w = v === t ? 1.0 : 0.3;
    for (let d = 0; d < 3; d++)
      edge(decTokens[v].cx + dimOffsets[d], dvY + R, decTokens[t].cx + dimOffsets[d], dattnOutY - R, decTokens[t].bg + opacity + ')', w);
  }
  dimOffsets.forEach((dx, i) => node(decTokens[t].cx + dx, dattnOutY, decTokens[t].bg + '0.15)', decTokens[t].color, dattnVecs[t][i], decTokens[t].light));
}

// Add & Norm
Y += 50;
layerLabel(Y, 'Add & LayerNorm', '#ffb74d');
Y += 34;
const dan1Y = Y;
const dan1Vecs = [[-0.9,0.2,0.7],[-0.5,0.1,0.4],[-0.3,0.3,0.0]];
for (let t = 0; t < decN; t++) {
  oneToOneEdges(tokenNodes(decTokens[t], dattnOutY), tokenNodes(decTokens[t], dan1Y), decTokens[t].bg + '0.2)', 1);
  dimOffsets.forEach((dx, i) => node(decTokens[t].cx + dx, dan1Y, 'rgba(255,152,0,0.12)', '#ff9800', dan1Vecs[t][i], '#ffb74d'));
}

// ════════════════════════════════════
// CROSS-ATTENTION
// ════════════════════════════════════
Y += 56;
sectionBox(40, Y, 1000, 360, 'rgba(0,188,212,0.02)', 'rgba(0,188,212,0.1)');
label(540, Y + 20, 'Cross-Attention: Decoder asks questions, Encoder provides answers', '#80deea', 13, '700');
Y += 14;
label(540, Y + 20, 'Q = from decoder.  K, V = from encoder output (computed once, reused).', 'rgba(255,255,255,0.3)', 10, '400');
Y += 14;
label(540, Y + 20, 'This is how the decoder "reads" the input sentence.', 'rgba(0,188,212,0.5)', 10, '600');

// Cross Q
Y += 44;
layerLabel(Y, 'Decoder x W_Q -> Cross-Attention Query', '#f48fb1');
Y += 34;
const cqY = Y;
const cqVecs = [[-0.6,0.1,0.5],[-0.3,0.1,0.3],[-0.2,0.2,0.0]];
for (let t = 0; t < decN; t++) {
  fcEdges(tokenNodes(decTokens[t], dan1Y), tokenNodes(decTokens[t], cqY), 'rgba(233,30,99,0.08)', 0.5);
  dimOffsets.forEach((dx, i) => node(decTokens[t].cx + dx, cqY, 'rgba(233,30,99,0.12)', '#e91e63', cqVecs[t][i], '#f48fb1'));
}
label(540, cqY + 24, 'Q from decoder (3 vectors) attends to K,V from encoder (6 vectors)', '#f48fb1', 10, '600');

Y += 48;
el('rect', { x: 60, y: Y - 10, width: 960, height: 36, rx: 8, fill: 'rgba(0,188,212,0.04)', stroke: 'rgba(0,188,212,0.2)', 'stroke-width': 1 });
label(540, Y + 10, 'K and V come from ENCODER OUTPUT (the 6 context-enriched vectors). No mask - full access.', '#80deea', 11, '700');

Y += 54;
layerLabel(Y, 'Cross-Attention: decoder Q . encoder K^T, weighted sum of encoder V', 'rgba(0,188,212,0.6)');
Y += 14;
label(540, Y, 'Each decoder token can attend to ALL 6 encoder tokens (no causal mask here)', 'rgba(255,255,255,0.25)', 10, '400');
Y += 30;
const crossOutY = Y;
const crossVecs = [[0.4,-0.1,0.8],[0.6,0.0,0.5],[0.5,0.2,0.3]];
for (let t = 0; t < decN; t++) {
  dimOffsets.forEach((dx, i) => node(decTokens[t].cx + dx, crossOutY, 'rgba(0,188,212,0.15)', '#00bcd4', crossVecs[t][i], '#80deea'));
}
callout(540, Y + 26, '"cat" can now see encoder "The", "cat", "sat", "on", "the", "mat" - the full input');

// Add & Norm after cross-attention
Y += 56;
layerLabel(Y, 'Add & LayerNorm', '#ffb74d');
Y += 34;
const dan2Y = Y;
const dan2Vecs = [[-0.4,0.1,0.3],[-0.2,0.0,0.2],[0.0,0.1,-0.1]];
for (let t = 0; t < decN; t++) {
  oneToOneEdges(tokenNodes(decTokens[t], crossOutY), tokenNodes(decTokens[t], dan2Y), decTokens[t].bg + '0.2)', 1);
  dimOffsets.forEach((dx, i) => node(decTokens[t].cx + dx, dan2Y, 'rgba(255,152,0,0.12)', '#ff9800', dan2Vecs[t][i], '#ffb74d'));
}

// ════════════════════════════════════
// DECODER FFN
// ════════════════════════════════════
Y += 56;
sectionBox(40, Y, 1000, 280, 'rgba(100,149,237,0.02)', 'rgba(100,149,237,0.1)');
label(540, Y + 20, 'Decoder FFN (same structure as encoder FFN)', '#90caf9', 12, '700');
Y += 14;
label(540, Y + 20, 'Each vector processed independently. Same weights for all positions.', 'rgba(255,255,255,0.25)', 10, '400');

Y += 42;
layerLabel(Y, 'FFN Layer 1: 3 -> 6 + ReLU', '#90caf9');
Y += 34;
const dffn1Y = Y;
for (let t = 0; t < decN; t++) {
  const from = tokenNodes(decTokens[t], dan2Y);
  for (const fn of from) for (const dx of ffnDX) edge(fn.x, fn.y + R, decTokens[t].cx + dx, dffn1Y - 8, 'rgba(100,149,237,0.06)', 0.4);
  for (const dx of ffnDX) node(decTokens[t].cx + dx, dffn1Y, 'rgba(100,149,237,0.12)', 'rgba(100,149,237,0.5)', '', '', 8);
}

Y += 48;
layerLabel(Y, 'FFN Layer 2: 6 -> 3', '#90caf9');
Y += 34;
const dffn2Y = Y;
const dffn2Vecs = [[0.3,-0.2,0.5],[0.2,0.0,0.3],[0.1,0.1,0.0]];
for (let t = 0; t < decN; t++) {
  const to = tokenNodes(decTokens[t], dffn2Y);
  for (const dx of ffnDX) for (const tn of to) edge(decTokens[t].cx + dx, dffn1Y + 8, tn.x, dffn2Y - R, 'rgba(100,149,237,0.06)', 0.4);
  dimOffsets.forEach((dx, i) => node(decTokens[t].cx + dx, dffn2Y, 'rgba(100,149,237,0.12)', 'rgba(100,149,237,0.6)', dffn2Vecs[t][i], '#90caf9'));
}

// Final Add & Norm
Y += 56;
layerLabel(Y, 'Add & LayerNorm (final decoder layer output)', '#ffb74d');
Y += 34;
const dan3Y = Y;
const dan3Vecs = [[-0.2,0.0,0.2],[0.0,0.1,0.1],[0.1,0.2,-0.3]];
for (let t = 0; t < decN; t++) {
  oneToOneEdges(tokenNodes(decTokens[t], dffn2Y), tokenNodes(decTokens[t], dan3Y), decTokens[t].bg + '0.2)', 1);
  dimOffsets.forEach((dx, i) => node(decTokens[t].cx + dx, dan3Y, 'rgba(255,152,0,0.12)', '#ff9800', dan3Vecs[t][i], '#ffb74d'));
}

// ════════════════════════════════════
// OUTPUT HEAD - TRAINING: ALL POSITIONS PRODUCE LOSS
// ════════════════════════════════════
Y += 72;
el('rect', { x: 30, y: Y - 10, width: 1020, height: 520, rx: 12, fill: 'rgba(156,120,255,0.02)', stroke: 'rgba(156,120,255,0.12)', 'stroke-width': 1.5, 'stroke-dasharray': '6,4' });
label(540, Y + 18, 'Output Head - TRAINING: Every Position Predicts the Next Token', '#b8a9ff', 14, '700');
Y += 16;
label(540, Y + 18, 'During training, we compute loss at ALL positions simultaneously (not just the last one).', 'rgba(0,230,118,0.5)', 11, '600');

// Explain WHY all positions are used
Y += 40;
explainBox(540, Y, 900, [
  ['WHY USE ALL POSITIONS (not just the last)?', 'rgba(255,152,0,0.8)', 12, '700'],
  ['During TRAINING, each position predicts the NEXT token. Position 0 (<s>) predicts "The", position 1 ("The") predicts "cat", position 2 ("cat") predicts "sat".', 'rgba(255,255,255,0.45)', 10, '400'],
  ['This gives us 3 training signals from 1 forward pass (one per position). Much more efficient than using just the last.', 'rgba(0,230,118,0.5)', 10, '600'],
  ['The causal mask ensures each position can only see past tokens, so every prediction is a fair "test".', 'rgba(255,255,255,0.35)', 10, '400'],
], 'rgba(255,152,0,0.4)', 'rgba(255,152,0,0.03)');

// Show all 3 predictions
Y += 100;

// Position 0: <s> -> predicts "The"
const pred0X = 160;
label(pred0X, Y, 'Position 0: "<s>"', decTokens[0].light, 11, '700');
Y += 6;
layerLabel(Y + 10, 'Linear + Softmax', '#b8a9ff');
Y += 36;
const p0Y = Y;
// Show edges from <s> output to vocab
const vocab0 = ['"The"', '"A"', '"cat"'];
const vocab0X = [110, 160, 210];
const prob0 = ['78%', '12%', '4%'];
for (const dx of dimOffsets) for (const vx of vocab0X) edge(decTokens[0].cx + dx, dan3Y + R, vx, p0Y - R, 'rgba(120,144,156,0.1)', 0.5);
vocab0X.forEach((vx, i) => {
  const isWin = i === 0;
  node(vx, p0Y, isWin ? 'rgba(76,175,80,0.2)' : 'rgba(255,255,255,0.05)', isWin ? '#4caf50' : 'rgba(255,255,255,0.2)', prob0[i], isWin ? '#80e8a5' : 'rgba(255,255,255,0.3)');
  label(vx, p0Y + 22, vocab0[i], 'rgba(255,255,255,0.35)', 9, '600');
});
label(pred0X, p0Y + 40, 'Target: "The"', 'rgba(0,230,118,0.6)', 10, '700');
label(pred0X, p0Y + 54, 'Loss = -log(0.78) = 0.25', 'rgba(255,255,255,0.3)', 9, '400');

// Position 1: "The" -> predicts "cat"
const pred1X = 540;
label(pred1X, Y - 36, 'Position 1: "The"', decTokens[1].light, 11, '700');
const vocab1 = ['"cat"', '"dog"', '"sat"'];
const vocab1X = [490, 540, 590];
const prob1 = ['71%', '12%', '8%'];
for (const dx of dimOffsets) for (const vx of vocab1X) edge(decTokens[1].cx + dx, dan3Y + R, vx, p0Y - R, 'rgba(233,30,99,0.1)', 0.5);
vocab1X.forEach((vx, i) => {
  const isWin = i === 0;
  node(vx, p0Y, isWin ? 'rgba(76,175,80,0.2)' : 'rgba(255,255,255,0.05)', isWin ? '#4caf50' : 'rgba(255,255,255,0.2)', prob1[i], isWin ? '#80e8a5' : 'rgba(255,255,255,0.3)');
  label(vx, p0Y + 22, vocab1[i], 'rgba(255,255,255,0.35)', 9, '600');
});
label(pred1X, p0Y + 40, 'Target: "cat"', 'rgba(0,230,118,0.6)', 10, '700');
label(pred1X, p0Y + 54, 'Loss = -log(0.71) = 0.34', 'rgba(255,255,255,0.3)', 9, '400');

// Position 2: "cat" -> predicts "sat"
const pred2X = 900;
label(pred2X, Y - 36, 'Position 2: "cat"', decTokens[2].light, 11, '700');
const vocab2 = ['"sat"', '"is"', '"ran"'];
const vocab2X = [850, 900, 950];
const prob2 = ['72%', '5%', '11%'];
for (const dx of dimOffsets) for (const vx of vocab2X) edge(decTokens[2].cx + dx, dan3Y + R, vx, p0Y - R, 'rgba(255,193,7,0.1)', 0.5);
vocab2X.forEach((vx, i) => {
  const isWin = i === 0;
  node(vx, p0Y, isWin ? 'rgba(76,175,80,0.2)' : 'rgba(255,255,255,0.05)', isWin ? '#4caf50' : 'rgba(255,255,255,0.2)', prob2[i], isWin ? '#80e8a5' : 'rgba(255,255,255,0.3)');
  label(vx, p0Y + 22, vocab2[i], 'rgba(255,255,255,0.35)', 9, '600');
});
label(pred2X, p0Y + 40, 'Target: "sat"', 'rgba(0,230,118,0.6)', 10, '700');
label(pred2X, p0Y + 54, 'Loss = -log(0.72) = 0.33', 'rgba(255,255,255,0.3)', 9, '400');

// Total loss
Y = p0Y + 76;
el('rect', { x: 300, y: Y - 8, width: 480, height: 28, rx: 8, fill: 'rgba(244,67,54,0.06)', stroke: 'rgba(244,67,54,0.3)', 'stroke-width': 1 });
label(540, Y + 10, 'Total Loss = avg(0.25 + 0.34 + 0.33) = 0.31 -> backprop updates ALL weights', '#ef9a9a', 11, '700');

// WHY NOT JUST LAST explanation
Y += 48;
explainBox(540, Y, 900, [
  ['During PRODUCTION (generation), we DO only use the last position output.', 'rgba(255,152,0,0.7)', 11, '700'],
  ['Because we already know all previous tokens (we generated them). Only the last position is "new".', 'rgba(255,255,255,0.4)', 10, '400'],
  ['But during TRAINING we use ALL positions because the causal mask makes every position a valid prediction task.', 'rgba(0,230,118,0.5)', 10, '600'],
  ['3 positions = 3 training examples from 1 forward pass. 1000 tokens = 999 free training signals!', 'rgba(255,255,255,0.45)', 10, '400'],
], 'rgba(255,152,0,0.4)', 'rgba(255,152,0,0.03)');

// ════════════════════════════════════
// SUMMARY BOX
// ════════════════════════════════════
Y += 110;
el('rect', { x: 30, y: Y, width: 1020, height: 310, rx: 10, fill: 'rgba(255,255,255,0.02)', stroke: 'rgba(255,255,255,0.08)', 'stroke-width': 1 });
label(540, Y + 22, 'Summary: Training Phase Flow', 'rgba(255,255,255,0.5)', 14, '700');

const summaryY = Y + 48;
const summaryLines = [
  ['Encoder:', 'ALL 6 input tokens flow as one 6x512 matrix through every layer. Bidirectional attention (no mask).', 'rgba(0,188,212,0.7)'],
  ['Decoder:', 'ALL 3 target tokens (<s>, "The", "cat") flow together (teacher forcing). Causal mask prevents cheating.', '#b8a9ff'],
  ['Cross-Attention:', 'Decoder Q attends to encoder K,V. Each decoder token can see ALL encoder tokens.', '#80deea'],
  ['Self-Attention:', 'MIXES information between tokens. Q.K^T creates cross-token connections.', '#ef9a9a'],
  ['FFN:', 'Does NOT mix tokens. Same weights applied independently to each vector. No cross-talk.', '#90caf9'],
  ['Add & Norm:', 'Per-vector operation. Adds residual, normalizes. No cross-token interaction.', '#ffb74d'],
  ['Output Head (train):', 'ALL positions produce predictions. Loss computed everywhere. 3 signals from 1 pass.', 'rgba(0,230,118,0.6)'],
  ['Output Head (gen):', 'Only LAST position predicts next token. Others already known.', 'rgba(255,152,0,0.6)'],
  ['Encoder runs ONCE.', 'Its output is reused as K,V for every decoder step. Decoder runs once (train) or N times (gen).', '#80deea'],
];
summaryLines.forEach(([title, desc, color], i) => {
  const sy = summaryY + i * 26;
  label(50, sy, title, color, 11, '700', 'start');
  label(270, sy, desc, 'rgba(255,255,255,0.35)', 10, '400', 'start');
});

// Resize viewBox to fit
const finalH = Y + 330;
svg.setAttribute('viewBox', `0 0 1080 ${finalH}`);

</script>
</body>
</html>
