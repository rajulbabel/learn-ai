<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Encoder-Decoder: Production / Inference Phase</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #08080d; display: flex; justify-content: center; padding: 20px 10px 60px; }
  .wrap { max-width: 1100px; width: 100%; }
  h1 { text-align: center; color: #ffb74d; font-family: sans-serif; font-size: 22px; margin-bottom: 4px; }
  .sub { text-align: center; color: rgba(255,255,255,0.35); font-family: sans-serif; font-size: 13px; margin-bottom: 16px; }
</style>
</head>
<body>
<div class="wrap">
<h1>Encoder-Decoder Transformer: Production / Inference Phase</h1>
<p class="sub">"The cat sat on the mat" - generating output one token at a time with KV cache</p>
<svg id="nn" width="100%" viewBox="0 0 1080 6200" style="display:block;">
<defs>
  <marker id="ah" markerWidth="6" markerHeight="4" refX="5" refY="2" orient="auto">
    <polygon points="0 0,6 2,0 4" fill="rgba(255,255,255,0.25)"/>
  </marker>
</defs>
</svg>
</div>

<script>
const svg = document.getElementById('nn');
const NS = 'http://www.w3.org/2000/svg';

const R = 12;
const DX = 24;
const dimOffsets = [-DX, 0, DX];

// ── Helpers ──
function el(tag, attrs, parent = svg) {
  const e = document.createElementNS(NS, tag);
  for (const [k, v] of Object.entries(attrs)) e.setAttribute(k, v);
  parent.appendChild(e);
  return e;
}
function node(cx, cy, fill, stroke, lbl, lblColor, r = R) {
  el('circle', { cx, cy, r, fill, stroke, 'stroke-width': 1.5 });
  if (lbl !== undefined && lbl !== '') el('text', { x: cx, y: cy + 4, fill: lblColor || '#fff', 'font-size': r > 10 ? 9 : 7, 'text-anchor': 'middle', 'font-family': 'monospace', 'font-weight': '600' }).textContent = lbl;
}
function edge(x1, y1, x2, y2, color = 'rgba(255,255,255,0.08)', width = 1) {
  el('line', { x1, y1, x2, y2, stroke: color, 'stroke-width': width });
}
function label(x, y, text, color = 'rgba(255,255,255,0.4)', size = 12, weight = '600', anchor = 'middle') {
  el('text', { x, y, fill: color, 'font-size': size, 'text-anchor': anchor, 'font-weight': weight, 'font-family': 'sans-serif' }).textContent = text;
}
function sectionBox(x, y, w, h, color, strokeColor) {
  el('rect', { x, y, width: w, height: h, rx: 12, fill: color, stroke: strokeColor, 'stroke-width': 1.5, 'stroke-dasharray': '6,4' });
}
function layerLabel(y, text, color) {
  const w = Math.max(220, text.length * 7.2 + 30);
  const x = 540 - w / 2;
  el('rect', { x, y: y - 12, width: w, height: 22, rx: 6, fill: '#08080d', stroke: color || 'rgba(255,255,255,0.15)', 'stroke-width': 1 });
  label(540, y + 3, text, color || 'rgba(255,255,255,0.45)', 11, '700');
}
function tokenNodes(cx, y) {
  return dimOffsets.map(dx => ({ x: cx + dx, y }));
}
function fcEdges(fromNodes, toNodes, color, width = 0.8) {
  for (const f of fromNodes) for (const t of toNodes) edge(f.x, f.y + R, t.x, t.y - R, color, width);
}
function oneToOneEdges(fromNodes, toNodes, color, width = 1) {
  for (let i = 0; i < fromNodes.length; i++) edge(fromNodes[i].x, fromNodes[i].y + R, toNodes[i].x, toNodes[i].y - R, color, width);
}
function callout(x, y, text, color = 'rgba(0,188,212,0.7)', bgColor = 'rgba(0,188,212,0.06)') {
  const w = text.length * 6 + 24;
  el('rect', { x: x - w/2, y: y - 11, width: w, height: 20, rx: 10, fill: bgColor, stroke: color, 'stroke-width': 0.8 });
  label(x, y + 3, text, color, 10, '600');
}
function explainBox(x, y, w, lines, borderColor = 'rgba(255,152,0,0.4)', bgColor = 'rgba(255,152,0,0.03)') {
  const h = lines.length * 18 + 16;
  el('rect', { x: x - w/2, y: y - 6, width: w, height: h, rx: 8, fill: bgColor, stroke: borderColor, 'stroke-width': 1 });
  lines.forEach((line, i) => {
    const [text, color, sz, wt] = Array.isArray(line) ? line : [line, 'rgba(255,255,255,0.4)', 10, '400'];
    label(x, y + 12 + i * 18, text, color, sz || 10, wt || '400');
  });
  return h;
}
// Cached item visual (dimmed, with "cached" badge)
function cachedNode(cx, cy, fill, stroke, lbl, lblColor, r = R) {
  node(cx, cy, fill, stroke, lbl, lblColor, r);
  // Dashed ring to show "cached"
  el('circle', { cx, cy, r: r + 3, fill: 'none', stroke: 'rgba(255,152,0,0.25)', 'stroke-width': 0.8, 'stroke-dasharray': '3,2' });
}
function cacheBadge(x, y, text = 'CACHED') {
  const w = text.length * 6.5 + 12;
  el('rect', { x: x - w/2, y: y - 9, width: w, height: 16, rx: 8, fill: 'rgba(255,152,0,0.08)', stroke: 'rgba(255,152,0,0.4)', 'stroke-width': 0.8 });
  label(x, y + 2, text, 'rgba(255,152,0,0.7)', 8, '700');
}
function newBadge(x, y, text = 'NEW - flows through network') {
  const w = text.length * 6 + 16;
  el('rect', { x: x - w/2, y: y - 9, width: w, height: 16, rx: 8, fill: 'rgba(0,230,118,0.06)', stroke: 'rgba(0,230,118,0.4)', 'stroke-width': 0.8 });
  label(x, y + 2, text, 'rgba(0,230,118,0.7)', 8, '700');
}

let Y = 30;

// ════════════════════════════════════
// MODE INDICATOR
// ════════════════════════════════════
el('rect', { x: 170, y: Y - 12, width: 740, height: 60, rx: 10, fill: 'rgba(255,152,0,0.04)', stroke: 'rgba(255,152,0,0.3)', 'stroke-width': 1.5 });
label(540, Y + 6, 'PRODUCTION / INFERENCE MODE (autoregressive generation)', 'rgba(255,152,0,0.8)', 16, '700');
label(540, Y + 24, 'Only ONE new token flows through the decoder at each step. Previous K,V are cached.', 'rgba(255,152,0,0.5)', 11, '600');
label(540, Y + 40, 'See encoder-decoder-flow.html for the training phase.', 'rgba(255,255,255,0.25)', 10, '400');

// ════════════════════════════════════
// OVERVIEW: THE BIG PICTURE
// ════════════════════════════════════
Y += 82;
explainBox(540, Y, 960, [
  ['HOW INFERENCE WORKS - THE BIG PICTURE', 'rgba(255,152,0,0.8)', 13, '700'],
  ['1. ENCODER runs ONCE on the full input "The cat sat on the mat" (6 tokens, all in parallel).', 'rgba(0,188,212,0.6)', 10, '600'],
  ['2. Encoder output (6 vectors) becomes K,V for cross-attention. Cached permanently.', 'rgba(0,188,212,0.5)', 10, '400'],
  ['3. DECODER runs in a LOOP, one new token at a time:', 'rgba(156,120,255,0.7)', 10, '600'],
  ['   Step 1: feed <s>           -> predict "The"', 'rgba(255,255,255,0.45)', 10, '400'],
  ['   Step 2: feed "The"         -> predict "cat"     (KV cache has <s>)', 'rgba(255,255,255,0.45)', 10, '400'],
  ['   Step 3: feed "cat"         -> predict "sat"     (KV cache has <s>, "The")', 'rgba(255,255,255,0.45)', 10, '400'],
  ['   Step 4: feed "sat"         -> predict "on"      (KV cache has <s>, "The", "cat")', 'rgba(255,255,255,0.45)', 10, '400'],
  ['   ...until <end> token is produced.', 'rgba(255,255,255,0.3)', 10, '400'],
  ['4. At each step, ONLY the new token runs through all layers. Previous tokens\' K,V are read from cache.', 'rgba(0,230,118,0.6)', 10, '700'],
], 'rgba(255,152,0,0.3)', 'rgba(255,152,0,0.02)');

// ════════════════════════════════════
// PHASE 1: ENCODER (runs once)
// ════════════════════════════════════
Y += 230;
sectionBox(20, Y, 1040, 200, 'rgba(0,188,212,0.02)', 'rgba(0,188,212,0.15)');
label(540, Y + 22, 'PHASE 1: ENCODER (runs ONCE, identical to training)', '#80deea', 14, '700');
Y += 16;
label(540, Y + 22, '"The cat sat on the mat" -> 6 tokens flow through all encoder layers in parallel', 'rgba(255,255,255,0.3)', 11, '400');
Y += 16;
label(540, Y + 22, 'Self-attention (bidirectional, no mask) -> Add&Norm -> FFN -> Add&Norm -> repeat x6', 'rgba(255,255,255,0.25)', 10, '400');

// Show encoder output as 6 cached vectors
Y += 50;
const encTokens = [
  { name: '"The"',  cx: 100,  color: '#f44336', light: '#ef9a9a', bg: 'rgba(244,67,54,' },
  { name: '"cat"',  cx: 280,  color: '#ffc107', light: '#ffe082', bg: 'rgba(255,193,7,' },
  { name: '"sat"',  cx: 460,  color: '#4caf50', light: '#80e8a5', bg: 'rgba(76,175,80,' },
  { name: '"on"',   cx: 640,  color: '#00bcd4', light: '#80deea', bg: 'rgba(0,188,212,' },
  { name: '"the"',  cx: 820,  color: '#9c27b0', light: '#ce93d8', bg: 'rgba(156,39,176,' },
  { name: '"mat"',  cx: 980,  color: '#ff9800', light: '#ffb74d', bg: 'rgba(255,152,0,' },
];
const encOutY = Y;
const encOutVecs = [[-0.8,-0.5,1.3],[-0.7,-0.3,1.0],[-0.5,-0.1,0.6],[-0.4,0.0,0.4],[-0.7,-0.4,1.1],[-0.3,-0.1,0.4]];
for (let t = 0; t < 6; t++) {
  label(encTokens[t].cx, encOutY - 18, encTokens[t].name, encTokens[t].light, 11, '700');
  dimOffsets.forEach((dx, i) => {
    cachedNode(encTokens[t].cx + dx, encOutY, encTokens[t].bg + '0.15)', encTokens[t].color, encOutVecs[t][i], encTokens[t].light);
  });
}
Y += 30;
cacheBadge(540, Y, 'ENCODER OUTPUT CACHED - reused as cross-attention K,V for every decoder step');

// ════════════════════════════════════
// PHASE 2: DECODER STEP 3 (generating "sat")
// ════════════════════════════════════
Y += 60;
el('rect', { x: 30, y: Y - 8, width: 1020, height: 40, rx: 8, fill: 'rgba(156,120,255,0.04)', stroke: 'rgba(156,120,255,0.2)', 'stroke-width': 1 });
label(540, Y + 12, 'PHASE 2: DECODER - showing Step 3: generating after "<s> The cat"', '#b8a9ff', 13, '700');
Y += 18;
label(540, Y + 12, 'Already generated: "<s>", "The", "cat". Now predicting the next token.', 'rgba(255,255,255,0.3)', 11, '400');

// Show the timeline of what we have
Y += 44;
explainBox(540, Y, 900, [
  ['DECODER STATE AT STEP 3', 'rgba(156,120,255,0.8)', 12, '700'],
  ['KV Cache (self-attention) contains K,V for: <s> (step 1), "The" (step 2). These were computed in earlier steps.', 'rgba(255,152,0,0.6)', 10, '600'],
  ['NEW token entering now: "cat" (the token we just generated in step 2).', 'rgba(0,230,118,0.6)', 10, '600'],
  ['Only "cat" flows through the full decoder. <s> and "The" are NOT recomputed.', 'rgba(255,255,255,0.4)', 10, '400'],
], 'rgba(156,120,255,0.3)', 'rgba(156,120,255,0.02)');

// ════════════════════════════════════
// DECODER: ONLY "cat" FLOWS
// ════════════════════════════════════
Y += 104;
sectionBox(20, Y, 1040, 2700, 'rgba(156,120,255,0.02)', 'rgba(156,120,255,0.12)');
label(540, Y + 22, 'DECODER STEP 3: Only "cat" flows through all layers', '#b8a9ff', 14, '700');

// Show all 3 tokens but highlight that only "cat" is new
Y += 54;
const cacheCol = 300;
const newCol = 780;

// Cached tokens (dimmed)
label(cacheCol, Y - 4, 'FROM KV CACHE (not recomputed)', 'rgba(255,152,0,0.6)', 11, '700');
Y += 24;
const cachedTokens = [
  { name: '"<s>"', cx: 200, color: '#78909c', light: '#b0bec5', bg: 'rgba(120,144,156,' },
  { name: '"The"',  cx: 400, color: '#e91e63', light: '#f48fb1', bg: 'rgba(233,30,99,' },
];

// New token (bright)
label(newCol, Y - 28, 'NEW TOKEN (flows through network)', 'rgba(0,230,118,0.6)', 11, '700');
const newTok = { name: '"cat"', cx: 780, color: '#ffc107', light: '#ffe082', bg: 'rgba(255,193,7,' };

const allDecY = Y;
// Draw cached tokens dimmed
for (const tok of cachedTokens) {
  label(tok.cx, Y - 16, tok.name, tok.light + '0.4)', 11, '600');
  dimOffsets.forEach((dx) => {
    cachedNode(tok.cx + dx, Y, tok.bg + '0.06)', tok.color + '0.3)', '', '', R);
  });
}
cacheBadge(cacheCol, Y + 24, 'K,V already in cache from steps 1-2');

// Draw new token bright
label(newTok.cx, Y - 16, newTok.name, newTok.light, 12, '700');
const newTokVecs = [1.47, 0.34, -0.17];
dimOffsets.forEach((dx, i) => {
  node(newTok.cx + dx, Y, newTok.bg + '0.2)', newTok.color, newTokVecs[i], newTok.light);
});
newBadge(newTok.cx, Y + 24, 'Embedded + positional encoded');

// ════════════════════════════════════
// MASKED SELF-ATTENTION (with KV cache)
// ════════════════════════════════════
Y += 60;
sectionBox(40, Y, 1000, 680, 'rgba(233,30,99,0.02)', 'rgba(233,30,99,0.1)');
label(540, Y + 20, 'Masked Self-Attention (with KV Cache)', '#f48fb1', 13, '700');
Y += 14;
label(540, Y + 20, 'Only "cat" computes Q. K,V for <s> and "The" come from cache.', 'rgba(255,255,255,0.25)', 10, '400');

// Q: only for "cat"
Y += 48;
layerLabel(Y, 'x W_Q -> Query (ONLY for "cat")', '#f48fb1');
Y += 34;
const sqY = Y;
const sqVecs = [0.4, 0.2, 0.6];
// Only new token gets Q
fcEdges(tokenNodes(newTok.cx, allDecY), tokenNodes(newTok.cx, sqY), 'rgba(233,30,99,0.1)', 0.6);
dimOffsets.forEach((dx, i) => node(newTok.cx + dx, sqY, 'rgba(233,30,99,0.15)', '#e91e63', sqVecs[i], '#f48fb1'));
newBadge(newTok.cx, sqY + 24, 'Only 1 Q vector computed (not 3)');

// K: "cat" computes new K, joins cached K for <s> and "The"
Y += 56;
layerLabel(Y, 'x W_K -> Key (new "cat" K joins cached <s>, "The" K)', '#ffe082');
Y += 34;
const skY = Y;
// Cached K for <s> and "The" (dimmed, with dashed ring)
const cachedKVecs = [[0.4,0.0,0.3],[0.7,0.2,0.1]];
for (let t = 0; t < 2; t++) {
  dimOffsets.forEach((dx, i) => {
    cachedNode(cachedTokens[t].cx + dx, skY, cachedTokens[t].bg + '0.06)', cachedTokens[t].color + '0.3)', cachedKVecs[t][i], cachedTokens[t].light + '0.4)');
  });
}
cacheBadge(cacheCol, skY + 24, 'K from cache (computed in steps 1-2)');
// New K for "cat"
const newKVecs = [0.3, 0.4, 0.5];
fcEdges(tokenNodes(newTok.cx, allDecY), tokenNodes(newTok.cx, skY), 'rgba(255,193,7,0.1)', 0.6);
dimOffsets.forEach((dx, i) => node(newTok.cx + dx, skY, 'rgba(255,193,7,0.15)', '#ffc107', newKVecs[i], '#ffe082'));
newBadge(newTok.cx, skY + 24, 'New K computed, then ADDED to cache');

// V: same pattern
Y += 56;
layerLabel(Y, 'x W_V -> Value (new "cat" V joins cached <s>, "The" V)', '#80e8a5');
Y += 34;
const svY = Y;
const cachedVVecs = [[0.5,-0.2,0.6],[0.8,0.1,0.4]];
for (let t = 0; t < 2; t++) {
  dimOffsets.forEach((dx, i) => {
    cachedNode(cachedTokens[t].cx + dx, svY, cachedTokens[t].bg + '0.06)', cachedTokens[t].color + '0.3)', cachedVVecs[t][i], cachedTokens[t].light + '0.4)');
  });
}
cacheBadge(cacheCol, svY + 24, 'V from cache (computed in steps 1-2)');
const newVVecs = [0.6, 0.3, 0.7];
fcEdges(tokenNodes(newTok.cx, allDecY), tokenNodes(newTok.cx, svY), 'rgba(76,175,80,0.1)', 0.6);
dimOffsets.forEach((dx, i) => node(newTok.cx + dx, svY, 'rgba(76,175,80,0.15)', '#4caf50', newVVecs[i], '#80e8a5'));
newBadge(newTok.cx, svY + 24, 'New V computed, then ADDED to cache');

// Attention computation
Y += 60;
layerLabel(Y, '"cat" Q attends to ALL K (cached + new)', 'rgba(255,255,255,0.5)');
Y += 14;
label(540, Y, '"cat" Q dots with K_<s>, K_The, K_cat -> 3 attention scores -> softmax -> weighted V sum', 'rgba(255,255,255,0.25)', 10, '400');

// Draw attention edges: cat Q -> all K
Y += 10;
for (const qn of tokenNodes(newTok.cx, sqY)) {
  // To cached K
  for (const kn of tokenNodes(cachedTokens[0].cx, skY))
    edge(qn.x, qn.y + R, kn.x, kn.y - R, 'rgba(255,193,7,0.08)', 0.5);
  for (const kn of tokenNodes(cachedTokens[1].cx, skY))
    edge(qn.x, qn.y + R, kn.x, kn.y - R, 'rgba(255,193,7,0.12)', 0.6);
  // To own K
  for (const kn of tokenNodes(newTok.cx, skY))
    edge(qn.x, qn.y + R, kn.x, kn.y - R, 'rgba(255,193,7,0.2)', 0.8);
}

// Attention output (single vector for "cat")
Y += 28;
layerLabel(Y, 'Attention Output (1 vector, not 3)', 'rgba(0,188,212,0.6)');
Y += 34;
const saOutY = Y;
const saOutVecs = [0.6, 0.1, 0.6];
// Show edges from all V to this output
for (let d = 0; d < 3; d++) {
  edge(cachedTokens[0].cx + dimOffsets[d], svY + R, newTok.cx + dimOffsets[d], saOutY - R, 'rgba(255,193,7,0.05)', 0.3);
  edge(cachedTokens[1].cx + dimOffsets[d], svY + R, newTok.cx + dimOffsets[d], saOutY - R, 'rgba(255,193,7,0.08)', 0.4);
  edge(newTok.cx + dimOffsets[d], svY + R, newTok.cx + dimOffsets[d], saOutY - R, 'rgba(255,193,7,0.2)', 0.8);
}
dimOffsets.forEach((dx, i) => node(newTok.cx + dx, saOutY, 'rgba(255,193,7,0.15)', '#ffc107', saOutVecs[i], '#ffe082'));
newBadge(newTok.cx, saOutY + 24, 'Single output vector for "cat" only');

// Explain the savings
Y += 50;
explainBox(540, Y, 880, [
  ['WHY IS THIS FASTER THAN RECOMPUTING?', 'rgba(0,230,118,0.8)', 11, '700'],
  ['Without cache: compute Q,K,V for ALL 3 tokens, run attention on 3x3 matrix. O(n^2).', 'rgba(255,255,255,0.4)', 10, '400'],
  ['With cache: compute Q,K,V for 1 token, read cached K,V, attention on 1x3. O(n).', 'rgba(0,230,118,0.5)', 10, '600'],
  ['At 100K tokens, that is 100,000x cheaper per step. KV cache is essential for fast generation.', 'rgba(255,255,255,0.45)', 10, '400'],
], 'rgba(0,230,118,0.3)', 'rgba(0,230,118,0.02)');

// Add & Norm
Y += 100;
layerLabel(Y, 'Add & LayerNorm (just 1 vector)', '#ffb74d');
Y += 34;
const dan1Y = Y;
const dan1Vec = [-0.3, 0.3, 0.0];
oneToOneEdges(tokenNodes(newTok.cx, saOutY), tokenNodes(newTok.cx, dan1Y), 'rgba(255,193,7,0.2)', 1);
dimOffsets.forEach((dx, i) => node(newTok.cx + dx, dan1Y, 'rgba(255,152,0,0.12)', '#ff9800', dan1Vec[i], '#ffb74d'));

// ════════════════════════════════════
// CROSS-ATTENTION (with encoder cache)
// ════════════════════════════════════
Y += 56;
sectionBox(40, Y, 1000, 380, 'rgba(0,188,212,0.02)', 'rgba(0,188,212,0.1)');
label(540, Y + 20, 'Cross-Attention (decoder Q, encoder K,V from cache)', '#80deea', 13, '700');
Y += 14;
label(540, Y + 20, 'Only "cat" computes Q. K,V are the 6 encoder vectors (cached from Phase 1).', 'rgba(255,255,255,0.25)', 10, '400');

// Cross Q for "cat" only
Y += 48;
layerLabel(Y, 'Decoder x W_Q -> Cross Q (just 1 vector for "cat")', '#f48fb1');
Y += 34;
const cqY = Y;
const cqVecs = [-0.2, 0.2, 0.0];
fcEdges(tokenNodes(newTok.cx, dan1Y), tokenNodes(newTok.cx, cqY), 'rgba(233,30,99,0.1)', 0.6);
dimOffsets.forEach((dx, i) => node(newTok.cx + dx, cqY, 'rgba(233,30,99,0.15)', '#e91e63', cqVecs[i], '#f48fb1'));

// Encoder K,V (cached)
Y += 44;
el('rect', { x: 40, y: Y - 10, width: 1000, height: 56, rx: 8, fill: 'rgba(0,188,212,0.03)', stroke: 'rgba(0,188,212,0.2)', 'stroke-width': 1 });
label(540, Y + 6, 'Encoder K,V: 6 vectors from encoder output (cached, never recomputed)', '#80deea', 11, '700');
const encCacheY = Y + 26;
for (let t = 0; t < 6; t++) {
  const cx = 100 + t * 170;
  el('rect', { x: cx - 28, y: encCacheY - 8, width: 56, height: 16, rx: 4, fill: encTokens[t].bg + '0.08)', stroke: encTokens[t].color + '0.4)', 'stroke-width': 0.8, 'stroke-dasharray': '3,2' });
  label(cx, encCacheY + 4, encTokens[t].name, encTokens[t].light + '0.5)', 8, '600');
}
cacheBadge(540, encCacheY + 18, 'ENCODER OUTPUT - computed once in Phase 1, reused every step');

// Cross attention output
Y += 76;
layerLabel(Y, '"cat" Q dots ALL 6 encoder K -> weighted sum of 6 encoder V', 'rgba(0,188,212,0.6)');
Y += 34;
const crossOutY = Y;
const crossVecs = [0.5, 0.2, 0.3];
// edges from Q to output
oneToOneEdges(tokenNodes(newTok.cx, cqY), tokenNodes(newTok.cx, crossOutY), 'rgba(0,188,212,0.2)', 1);
dimOffsets.forEach((dx, i) => node(newTok.cx + dx, crossOutY, 'rgba(0,188,212,0.15)', '#00bcd4', crossVecs[i], '#80deea'));
callout(newTok.cx, crossOutY + 24, '"cat" now incorporates information from ALL input words');

// Add & Norm
Y += 52;
layerLabel(Y, 'Add & LayerNorm', '#ffb74d');
Y += 34;
const dan2Y = Y;
const dan2Vec = [0.0, 0.1, -0.1];
oneToOneEdges(tokenNodes(newTok.cx, crossOutY), tokenNodes(newTok.cx, dan2Y), 'rgba(255,193,7,0.2)', 1);
dimOffsets.forEach((dx, i) => node(newTok.cx + dx, dan2Y, 'rgba(255,152,0,0.12)', '#ff9800', dan2Vec[i], '#ffb74d'));

// ════════════════════════════════════
// DECODER FFN (just 1 vector)
// ════════════════════════════════════
Y += 56;
sectionBox(40, Y, 1000, 270, 'rgba(100,149,237,0.02)', 'rgba(100,149,237,0.1)');
label(540, Y + 20, 'Decoder FFN (just 1 vector through - "cat" only)', '#90caf9', 12, '700');
Y += 14;
label(540, Y + 20, 'FFN processes each vector independently, so only the new token needs to go through.', 'rgba(255,255,255,0.25)', 10, '400');

Y += 42;
layerLabel(Y, 'FFN Layer 1: 3 -> 6 + ReLU', '#90caf9');
Y += 34;
const dffn1Y = Y;
const ffnDX = [-36, -22, -7, 7, 22, 36];
const from = tokenNodes(newTok.cx, dan2Y);
for (const fn of from) for (const dx of ffnDX) edge(fn.x, fn.y + R, newTok.cx + dx, dffn1Y - 8, 'rgba(100,149,237,0.08)', 0.5);
for (const dx of ffnDX) node(newTok.cx + dx, dffn1Y, 'rgba(100,149,237,0.15)', 'rgba(100,149,237,0.6)', '', '', 8);

Y += 48;
layerLabel(Y, 'FFN Layer 2: 6 -> 3', '#90caf9');
Y += 34;
const dffn2Y = Y;
const dffn2Vecs = [0.1, 0.1, 0.0];
const to = tokenNodes(newTok.cx, dffn2Y);
for (const dx of ffnDX) for (const tn of to) edge(newTok.cx + dx, dffn1Y + 8, tn.x, dffn2Y - R, 'rgba(100,149,237,0.08)', 0.5);
dimOffsets.forEach((dx, i) => node(newTok.cx + dx, dffn2Y, 'rgba(100,149,237,0.15)', 'rgba(100,149,237,0.7)', dffn2Vecs[i], '#90caf9'));

Y += 14;
explainBox(540, Y + 20, 880, [
  ['WHY ONLY RUN FFN ON THE NEW TOKEN?', 'rgba(0,230,118,0.8)', 11, '700'],
  ['FFN does NOT mix information between tokens. It applies the same function to each vector independently.', 'rgba(255,255,255,0.4)', 10, '400'],
  ['Previous tokens\' FFN outputs are already "baked into" the K,V vectors stored in the cache.', 'rgba(255,255,255,0.4)', 10, '400'],
  ['So running FFN on <s> or "The" again would produce the EXACT same output. No point recomputing.', 'rgba(0,230,118,0.5)', 10, '600'],
], 'rgba(0,230,118,0.3)', 'rgba(0,230,118,0.02)');

// Final Add & Norm
Y += 110;
layerLabel(Y, 'Add & LayerNorm (decoder block output for "cat")', '#ffb74d');
Y += 34;
const dan3Y = Y;
const dan3Vec = [0.1, 0.2, -0.3];
oneToOneEdges(tokenNodes(newTok.cx, dffn2Y), tokenNodes(newTok.cx, dan3Y), 'rgba(255,193,7,0.2)', 1);
dimOffsets.forEach((dx, i) => node(newTok.cx + dx, dan3Y, 'rgba(255,152,0,0.12)', '#ff9800', dan3Vec[i], '#ffb74d'));

// ════════════════════════════════════
// OUTPUT HEAD (always last token = new token)
// ════════════════════════════════════
Y += 64;
el('rect', { x: 540, y: Y - 10, width: 500, height: 360, rx: 12, fill: 'rgba(156,120,255,0.02)', stroke: 'rgba(156,120,255,0.15)', 'stroke-width': 1.5, 'stroke-dasharray': '6,4' });
label(790, Y + 16, 'Output Head ("cat" vector -> next word prediction)', '#b8a9ff', 13, '700');

Y += 42;
layerLabel(Y, 'Linear Projection (3 -> vocab size)', '#b8a9ff');
Y += 36;
const outY = Y;
const vocabWords = ['"sat"', '"is"', '"ran"', '"sees"', '"went"'];
const vocabX = [590, 660, 730, 800, 870];
const vocabScores = [3.5, 0.8, 1.2, -0.3, 0.5];

for (const dx of dimOffsets) for (const vx of vocabX) edge(newTok.cx + dx, dan3Y + R, vx, outY - R, 'rgba(156,120,255,0.12)', 0.6);
vocabX.forEach((vx, i) => {
  node(vx, outY, 'rgba(156,120,255,0.12)', '#9c78ff', vocabScores[i], '#b8a9ff');
  label(vx, outY - 18, vocabWords[i], 'rgba(255,255,255,0.35)', 9, '600');
});

// Softmax
Y += 60;
layerLabel(Y, 'Softmax -> Probabilities', 'rgba(255,255,255,0.5)');
Y += 36;
const smY = Y;
const probs = ['72.1%', '4.8%', '7.2%', '1.6%', '3.6%'];
vocabX.forEach((vx, i) => {
  edge(vx, outY + R, vx, smY - R, 'rgba(255,255,255,0.1)', 0.8);
  const isW = i === 0;
  node(vx, smY, isW ? 'rgba(76,175,80,0.2)' : 'rgba(255,255,255,0.05)', isW ? '#4caf50' : 'rgba(255,255,255,0.2)', probs[i], isW ? '#80e8a5' : 'rgba(255,255,255,0.3)');
});

Y += 50;
el('rect', { x: 700, y: Y - 4, width: 60, height: 28, rx: 10, fill: 'rgba(76,175,80,0.2)', stroke: '#4caf50', 'stroke-width': 2 });
label(730, Y + 14, '"sat"', '#80e8a5', 14, '700');
edge(730, smY + R, 730, Y - 6, 'rgba(76,175,80,0.4)', 1.5);

Y += 42;
label(790, Y, 'Predicted next token: "sat"', 'rgba(255,255,255,0.3)', 11, '600');
label(790, Y + 16, '"sat" feeds back as decoder input for Step 4.', 'rgba(255,152,0,0.5)', 10, '600');

// Explain WHY only last
Y += 44;
explainBox(540, Y, 960, [
  ['WHY ONLY THE LAST POSITION?', 'rgba(255,152,0,0.8)', 12, '700'],
  ['During generation, there IS only one position flowing through - the new token.', 'rgba(255,255,255,0.5)', 10, '400'],
  ['<s> and "The" were processed in Steps 1-2. Their predictions are done. We already used them.', 'rgba(255,255,255,0.4)', 10, '400'],
  ['The single vector for "cat" at the output is all we need to predict the next word "sat".', 'rgba(0,230,118,0.5)', 10, '600'],
], 'rgba(255,152,0,0.3)', 'rgba(255,152,0,0.02)');

// ════════════════════════════════════
// WHAT HAPPENS NEXT
// ════════════════════════════════════
Y += 110;
el('rect', { x: 30, y: Y, width: 1020, height: 180, rx: 10, fill: 'rgba(255,255,255,0.02)', stroke: 'rgba(255,255,255,0.08)', 'stroke-width': 1 });
label(540, Y + 22, 'What Happens Next', 'rgba(255,255,255,0.5)', 14, '700');

Y += 46;
label(540, Y, 'Step 4: "sat" enters the decoder. KV cache now has <s>, "The", "cat". Predicts "on".', 'rgba(255,255,255,0.4)', 11, '400');
Y += 22;
label(540, Y, 'Step 5: "on" enters. KV cache has <s>, "The", "cat", "sat". Predicts "the".', 'rgba(255,255,255,0.4)', 11, '400');
Y += 22;
label(540, Y, 'Step 6: "the" enters. KV cache has <s>, "The", "cat", "sat", "on". Predicts "mat".', 'rgba(255,255,255,0.4)', 11, '400');
Y += 22;
label(540, Y, 'Step 7: "mat" enters. Predicts <end>. Generation stops.', 'rgba(255,255,255,0.4)', 11, '400');
Y += 26;
label(540, Y, 'Final output: "The cat sat on the mat" (7 decoder steps, encoder ran once)', 'rgba(0,230,118,0.6)', 12, '700');

// ════════════════════════════════════
// SUMMARY: MEMORY COST
// ════════════════════════════════════
Y += 58;
el('rect', { x: 30, y: Y, width: 1020, height: 320, rx: 10, fill: 'rgba(255,255,255,0.02)', stroke: 'rgba(255,255,255,0.08)', 'stroke-width': 1 });
label(540, Y + 22, 'KV Cache: Memory vs Speed Tradeoff', 'rgba(255,255,255,0.5)', 14, '700');

const mY = Y + 50;
const memLines = [
  ['What is stored:', 'K and V vectors at every attention layer, for every past token.', 'rgba(0,188,212,0.6)'],
  ['Self-attention cache:', 'Grows by 1 entry per step. At step N, holds N-1 K,V pairs per layer.', '#f48fb1'],
  ['Cross-attention cache:', 'Fixed size (6 vectors K + 6 vectors V). Set once from encoder output.', '#80deea'],
  ['Real scale (GPT-4):', '96 layers, 128 heads, 128 dims/head. Each token = 96*128*128 = 1.57M floats for K+V.', 'rgba(255,255,255,0.5)'],
  ['At 100K context:', '100K * 1.57M * 2 bytes (fp16) = ~300 GB just for the KV cache.', '#ef9a9a'],
  ['Without cache:', 'Each step would recompute ALL tokens. Step N costs O(N). Total: O(N^2). Impossibly slow.', 'rgba(255,255,255,0.4)'],
  ['With cache:', 'Each step costs O(1) for FFN + O(N) for attention lookup. Total: O(N). Much faster.', 'rgba(0,230,118,0.6)'],
  ['Tradeoff:', 'KV cache uses lots of GPU memory but makes generation feasible. No cache = no fast LLMs.', 'rgba(255,152,0,0.6)'],
];
memLines.forEach(([title, desc, color], i) => {
  const sy = mY + i * 28;
  label(50, sy, title, color, 11, '700', 'start');
  label(270, sy, desc, 'rgba(255,255,255,0.35)', 10, '400', 'start');
});

// Resize viewBox
const finalH = Y + 340;
svg.setAttribute('viewBox', `0 0 1080 ${finalH}`);

</script>
</body>
</html>
