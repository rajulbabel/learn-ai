<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Transformer NN Graph</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #08080d; display: flex; justify-content: center; padding: 20px 10px 60px; }
  .wrap { max-width: 960px; width: 100%; }
  h1 { text-align: center; color: #80deea; font-family: sans-serif; font-size: 22px; margin-bottom: 4px; }
  .sub { text-align: center; color: rgba(255,255,255,0.35); font-family: sans-serif; font-size: 13px; margin-bottom: 16px; }
</style>
</head>
<body>
<div class="wrap">
<h1>Transformer Neural Network Graph</h1>
<p class="sub">"I love cats" - every neuron, every edge, every layer</p>
<svg id="nn" width="100%" viewBox="0 0 940 2260" style="display:block;">
<defs>
  <marker id="ah" markerWidth="6" markerHeight="4" refX="5" refY="2" orient="auto">
    <polygon points="0 0,6 2,0 4" fill="rgba(255,255,255,0.25)"/>
  </marker>
</defs>
</svg>
</div>

<script>
const svg = document.getElementById('nn');
const NS = 'http://www.w3.org/2000/svg';

// Token config
const tokens = [
  { name: '"I"', vec: [1,2,3], cx: 160, color: '#f44336', light: '#ef9a9a', bg: 'rgba(244,67,54,' },
  { name: '"love"', vec: [11,22,33], cx: 460, color: '#ffc107', light: '#ffe082', bg: 'rgba(255,193,7,' },
  { name: '"cats"', vec: [111,222,333], cx: 760, color: '#4caf50', light: '#80e8a5', bg: 'rgba(76,175,80,' },
];
const R = 14; // node radius
const DX = 36; // dim offset within token
const dimOffsets = [-DX, 0, DX];

// Helpers
function el(tag, attrs, parent = svg) {
  const e = document.createElementNS(NS, tag);
  for (const [k, v] of Object.entries(attrs)) e.setAttribute(k, v);
  parent.appendChild(e);
  return e;
}

function node(cx, cy, fill, stroke, label, labelColor, r = R) {
  el('circle', { cx, cy, r, fill, stroke, 'stroke-width': 1.5 });
  if (label) el('text', { x: cx, y: cy + 4.5, fill: labelColor || '#fff', 'font-size': r > 10 ? 10 : 8, 'text-anchor': 'middle', 'font-family': 'monospace', 'font-weight': '600' }).textContent = label;
}

function edge(x1, y1, x2, y2, color = 'rgba(255,255,255,0.08)', width = 1) {
  el('line', { x1, y1, x2, y2, stroke: color, 'stroke-width': width });
}

function label(x, y, text, color = 'rgba(255,255,255,0.4)', size = 12, weight = '600', anchor = 'middle') {
  el('text', { x, y, fill: color, 'font-size': size, 'text-anchor': anchor, 'font-weight': weight, 'font-family': 'sans-serif' }).textContent = text;
}

function sectionBox(x, y, w, h, color = 'rgba(255,255,255,0.06)', strokeColor = 'rgba(255,255,255,0.1)') {
  el('rect', { x, y, width: w, height: h, rx: 12, fill: color, stroke: strokeColor, 'stroke-width': 1.5, 'stroke-dasharray': '6,4' });
}

function layerLabel(y, text, color) {
  el('rect', { x: 370, y: y - 12, width: 200, height: 22, rx: 6, fill: '#08080d', stroke: color || 'rgba(255,255,255,0.15)', 'stroke-width': 1 });
  label(470, y + 3, text, color || 'rgba(255,255,255,0.45)', 11, '700');
}

// Get node positions for a token layer
function tokenNodes(tok, y) {
  return dimOffsets.map(dx => ({ x: tok.cx + dx, y }));
}

// Draw fully connected edges between two layers of same token
function fcEdges(fromNodes, toNodes, color, width = 0.8) {
  for (const f of fromNodes)
    for (const t of toNodes)
      edge(f.x, f.y + R, t.x, t.y - R, color, width);
}

// Draw 1:1 edges
function oneToOneEdges(fromNodes, toNodes, color, width = 1) {
  for (let i = 0; i < fromNodes.length; i++)
    edge(fromNodes[i].x, fromNodes[i].y + R, toNodes[i].x, toNodes[i].y - R, color, width);
}

// Draw skip connection (curved path on the side)
function skipConnection(fromY, toY, side, color) {
  const x = side === 'left' ? 48 : 892;
  const dir = side === 'left' ? -1 : 1;
  const cx1 = x - dir * 20;
  el('path', {
    d: `M ${x + dir * 12},${fromY} C ${cx1},${fromY} ${cx1},${toY} ${x + dir * 12},${toY}`,
    fill: 'none', stroke: color, 'stroke-width': 1.5, 'stroke-dasharray': '4,3',
    'marker-end': 'url(#ah)'
  });
}

let Y = 40;

// ============================
// INPUT TOKENS
// ============================
label(470, Y, 'Input Tokens', 'rgba(255,255,255,0.5)', 14, '700');
Y += 40;
const inputY = Y;
for (const tok of tokens) {
  label(tok.cx, Y - 22, tok.name, tok.light, 13, '700');
  const vals = tok.vec;
  dimOffsets.forEach((dx, i) => {
    node(tok.cx + dx, Y, tok.bg + '0.15)', tok.color, '' + vals[i], tok.light);
  });
}

// ============================
// EMBEDDING + POSITIONAL ENCODING
// ============================
Y += 70;
layerLabel(Y, 'Embedding + PosEnc', 'rgba(0,188,212,0.6)');
Y += 36;
const embY = Y;
const embVecs = [[1.0, 3.0, 3.0], [11.8, 22.5, 33.0], [111.9, 221.6, 333.0]];
for (let t = 0; t < 3; t++) {
  const tok = tokens[t];
  const from = tokenNodes(tok, inputY);
  const to = tokenNodes(tok, embY);
  oneToOneEdges(from, to, tok.bg + '0.2)', 1.2);
  dimOffsets.forEach((dx, i) => {
    node(tok.cx + dx, embY, tok.bg + '0.15)', tok.color, embVecs[t][i], tok.light);
  });
}

// ============================
// TRANSFORMER BLOCK
// ============================
Y += 50;
sectionBox(30, Y, 880, 1660, 'rgba(255,255,255,0.015)', 'rgba(255,255,255,0.08)');
label(470, Y + 20, 'Transformer Block (x96 in GPT-4)', 'rgba(255,255,255,0.3)', 13, '700');

// ============================
// MULTI-HEAD ATTENTION
// ============================
Y += 40;
sectionBox(55, Y, 830, 820, 'rgba(244,67,54,0.02)', 'rgba(244,67,54,0.12)');
label(470, Y + 20, 'Multi-Head Attention', '#ef9a9a', 13, '700');

// --- W_Q projection ---
Y += 48;
layerLabel(Y, '× W_Q (learned)', '#ef9a9a');
Y += 36;
const qY = Y;
const qVecs = [[0.7, 1.5, 1.1], [8.5, 16.2, 12.1], [85.1, 162, 121]];
for (let t = 0; t < 3; t++) {
  const tok = tokens[t];
  const from = tokenNodes(tok, embY);
  const to = tokenNodes(tok, qY);
  fcEdges(from, to, 'rgba(244,67,54,0.12)', 0.7);
  dimOffsets.forEach((dx, i) => {
    node(tok.cx + dx, qY, 'rgba(244,67,54,0.12)', '#f44336', qVecs[t][i], '#ef9a9a');
  });
}
label(tokens[0].cx, qY + 26, 'Q', '#ef9a9a', 10, '700');
label(tokens[1].cx, qY + 26, 'Q', '#ef9a9a', 10, '700');
label(tokens[2].cx, qY + 26, 'Q', '#ef9a9a', 10, '700');

// --- W_K projection ---
Y += 68;
layerLabel(Y, '× W_K (learned)', '#ffe082');
Y += 36;
const kY = Y;
const kVecs = [[0.9, 2.4, 0.1], [10.2, 25.8, 1.1], [102, 258, 11.1]];
for (let t = 0; t < 3; t++) {
  const tok = tokens[t];
  const from = tokenNodes(tok, embY);
  const to = tokenNodes(tok, kY);
  fcEdges(from, to, 'rgba(255,193,7,0.1)', 0.7);
  dimOffsets.forEach((dx, i) => {
    node(tok.cx + dx, kY, 'rgba(255,193,7,0.12)', '#ffc107', kVecs[t][i], '#ffe082');
  });
}
label(tokens[0].cx, kY + 26, 'K', '#ffe082', 10, '700');
label(tokens[1].cx, kY + 26, 'K', '#ffe082', 10, '700');
label(tokens[2].cx, kY + 26, 'K', '#ffe082', 10, '700');

// --- W_V projection ---
Y += 68;
layerLabel(Y, '× W_V (learned)', '#80e8a5');
Y += 36;
const vY = Y;
const vVecs = [[1.4, 0.6, 1.5], [15.4, 6.6, 16.5], [154, 66.3, 165]];
for (let t = 0; t < 3; t++) {
  const tok = tokens[t];
  const from = tokenNodes(tok, embY);
  const to = tokenNodes(tok, vY);
  fcEdges(from, to, 'rgba(76,175,80,0.1)', 0.7);
  dimOffsets.forEach((dx, i) => {
    node(tok.cx + dx, vY, 'rgba(76,175,80,0.12)', '#4caf50', vVecs[t][i], '#80e8a5');
  });
}
label(tokens[0].cx, vY + 26, 'V', '#80e8a5', 10, '700');
label(tokens[1].cx, vY + 26, 'V', '#80e8a5', 10, '700');
label(tokens[2].cx, vY + 26, 'V', '#80e8a5', 10, '700');

// --- Q · K^T attention scores ---
Y += 72;
layerLabel(Y, 'Q · K^T (dot product)', 'rgba(255,255,255,0.5)');
Y += 10;
// Draw cross-token edges from Q to K (causal: each token attends to itself and before)
// "I" Q -> "I" K only
for (const qn of tokenNodes(tokens[0], qY))
  for (const kn of tokenNodes(tokens[0], kY))
    edge(qn.x, qn.y + R, kn.x, kn.y - R - 2, 'rgba(244,67,54,0.2)', 0.6);

// "love" Q -> "I" K + "love" K
for (const qn of tokenNodes(tokens[1], qY)) {
  for (const kn of tokenNodes(tokens[0], kY))
    edge(qn.x, qn.y + R, kn.x, kn.y - R - 2, 'rgba(255,193,7,0.12)', 0.5);
  for (const kn of tokenNodes(tokens[1], kY))
    edge(qn.x, qn.y + R, kn.x, kn.y - R - 2, 'rgba(255,193,7,0.2)', 0.6);
}

// "cats" Q -> all K
for (const qn of tokenNodes(tokens[2], qY)) {
  for (const kn of tokenNodes(tokens[0], kY))
    edge(qn.x, qn.y + R, kn.x, kn.y - R - 2, 'rgba(76,175,80,0.08)', 0.4);
  for (const kn of tokenNodes(tokens[1], kY))
    edge(qn.x, qn.y + R, kn.x, kn.y - R - 2, 'rgba(76,175,80,0.12)', 0.5);
  for (const kn of tokenNodes(tokens[2], kY))
    edge(qn.x, qn.y + R, kn.x, kn.y - R - 2, 'rgba(76,175,80,0.2)', 0.6);
}

// Causal mask note
label(470, Y + 24, 'causal mask: each token only attends to previous tokens', 'rgba(255,255,255,0.25)', 10, '400');

// --- Softmax + Weighted sum of V ---
Y += 50;
layerLabel(Y, 'Softmax + Weighted V Sum', 'rgba(0,188,212,0.6)');
Y += 36;
const attnOutY = Y;
// Edges from V to attention output (weighted by attention - self-attention dominant)
// "I" gets V_I (weight 1.0)
for (let i = 0; i < 3; i++)
  edge(tokens[0].cx + dimOffsets[i], vY + R, tokens[0].cx + dimOffsets[i], attnOutY - R, 'rgba(244,67,54,0.25)', 1.2);
// "love" gets mix of V_I and V_love (mostly V_love)
for (let i = 0; i < 3; i++) {
  edge(tokens[0].cx + dimOffsets[i], vY + R, tokens[1].cx + dimOffsets[i], attnOutY - R, 'rgba(255,193,7,0.06)', 0.5);
  edge(tokens[1].cx + dimOffsets[i], vY + R, tokens[1].cx + dimOffsets[i], attnOutY - R, 'rgba(255,193,7,0.25)', 1.2);
}
// "cats" gets mix of all V (mostly V_cats)
for (let i = 0; i < 3; i++) {
  edge(tokens[0].cx + dimOffsets[i], vY + R, tokens[2].cx + dimOffsets[i], attnOutY - R, 'rgba(76,175,80,0.04)', 0.4);
  edge(tokens[1].cx + dimOffsets[i], vY + R, tokens[2].cx + dimOffsets[i], attnOutY - R, 'rgba(76,175,80,0.06)', 0.5);
  edge(tokens[2].cx + dimOffsets[i], vY + R, tokens[2].cx + dimOffsets[i], attnOutY - R, 'rgba(76,175,80,0.25)', 1.2);
}

const attnOutVecs = [[1.4, 0.6, 1.5], [15.0, 6.4, 16.2], [150, 64.8, 162]];
for (let t = 0; t < 3; t++) {
  dimOffsets.forEach((dx, i) => {
    node(tokens[t].cx + dx, attnOutY, tokens[t].bg + '0.15)', tokens[t].color, attnOutVecs[t][i], tokens[t].light);
  });
}

// --- W_O projection ---
Y += 68;
layerLabel(Y, '× W_O (learned)', '#b8a9ff');
Y += 36;
const woY = Y;
const woVecs = [[0.8, -0.3, 1.2], [9.1, -3.2, 13.0], [91, -32, 130]];
for (let t = 0; t < 3; t++) {
  const from = tokenNodes(tokens[t], attnOutY);
  const to = tokenNodes(tokens[t], woY);
  fcEdges(from, to, 'rgba(156,120,255,0.12)', 0.7);
  dimOffsets.forEach((dx, i) => {
    node(tokens[t].cx + dx, woY, 'rgba(156,120,255,0.12)', '#9c78ff', woVecs[t][i], '#b8a9ff');
  });
}

// End multi-head attention box
// ============================
// ADD & NORM 1
// ============================
Y += 64;
layerLabel(Y, 'Add & LayerNorm (learned γ,β)', '#ffb74d');
Y += 36;
const an1Y = Y;
const an1Vecs = [[-1.2, 0.0, 1.2], [-1.1, -0.1, 1.2], [-1.0, -0.2, 1.2]];

// Skip connection from embedding to Add&Norm
for (let t = 0; t < 3; t++) {
  const side = t === 0 ? 65 : t === 1 ? 470 : 875;
  el('path', {
    d: `M ${side},${embY + R + 2} L ${side - (t === 2 ? -14 : 14)},${embY + R + 8} L ${side - (t === 2 ? -14 : 14)},${an1Y - R - 8} L ${side},${an1Y - R - 2}`,
    fill: 'none', stroke: tokens[t].bg + '0.15)', 'stroke-width': 1.5, 'stroke-dasharray': '4,3'
  });
  label(side - (t === 2 ? -20 : 20), (embY + an1Y) / 2, 'skip', tokens[t].bg + '0.2)', 8, '600');
}

// Edges from W_O to Add&Norm
for (let t = 0; t < 3; t++) {
  oneToOneEdges(tokenNodes(tokens[t], woY), tokenNodes(tokens[t], an1Y), tokens[t].bg + '0.2)', 1);
  dimOffsets.forEach((dx, i) => {
    node(tokens[t].cx + dx, an1Y, 'rgba(255,152,0,0.12)', '#ff9800', an1Vecs[t][i], '#ffb74d');
  });
}

// ============================
// FFN
// ============================
Y += 56;
sectionBox(55, Y, 830, 310, 'rgba(100,149,237,0.02)', 'rgba(100,149,237,0.12)');
label(470, Y + 20, 'Feed-Forward Network (FFN)', '#90caf9', 13, '700');

// FFN Layer 1: 3 -> 6 (expand) + ReLU
Y += 44;
layerLabel(Y, 'FFN Layer 1 + ReLU (learned)', '#90caf9');
Y += 40;
const ffn1Y = Y;
const ffnDX = [-44, -26, -9, 9, 26, 44]; // 6 nodes per token

for (let t = 0; t < 3; t++) {
  const from = tokenNodes(tokens[t], an1Y);
  // Draw edges from 3 input nodes to 6 hidden nodes
  for (const fn of from) {
    for (const dx of ffnDX) {
      edge(fn.x, fn.y + R, tokens[t].cx + dx, ffn1Y - R, 'rgba(100,149,237,0.08)', 0.5);
    }
  }
  // Draw 6 hidden nodes
  for (const dx of ffnDX) {
    node(tokens[t].cx + dx, ffn1Y, 'rgba(100,149,237,0.12)', 'rgba(100,149,237,0.5)', '', '', 10);
  }
}
label(470, ffn1Y + 22, '6 hidden neurons per token (ReLU activated)', 'rgba(255,255,255,0.25)', 10, '400');

// FFN Layer 2: 6 -> 3 (compress)
Y += 62;
layerLabel(Y, 'FFN Layer 2 (learned)', '#90caf9');
Y += 36;
const ffn2Y = Y;

for (let t = 0; t < 3; t++) {
  const to = tokenNodes(tokens[t], ffn2Y);
  // Edges from 6 hidden to 3 output
  for (const dx of ffnDX) {
    for (const tn of to) {
      edge(tokens[t].cx + dx, ffn1Y + 10, tn.x, ffn2Y - R, 'rgba(100,149,237,0.08)', 0.5);
    }
  }
  const ffn2Vecs = [[0.5, -0.3, 0.9], [5.8, -3.5, 9.7], [58, -35, 97]];
  dimOffsets.forEach((dx, i) => {
    node(tokens[t].cx + dx, ffn2Y, 'rgba(100,149,237,0.12)', 'rgba(100,149,237,0.6)', ffn2Vecs[t][i], '#90caf9');
  });
}

// ============================
// ADD & NORM 2
// ============================
Y += 68;
layerLabel(Y, 'Add & LayerNorm (learned γ,β)', '#ffb74d');
Y += 36;
const an2Y = Y;
const an2Vecs = [[-0.8, -0.5, 1.3], [-0.7, -0.6, 1.3], [-0.6, -0.7, 1.3]];

// Skip connection from Add&Norm 1 to Add&Norm 2
for (let t = 0; t < 3; t++) {
  const side = t === 0 ? 100 : t === 1 ? 505 : 840;
  el('path', {
    d: `M ${side},${an1Y + R + 2} L ${side - (t === 2 ? -10 : 10)},${an1Y + R + 8} L ${side - (t === 2 ? -10 : 10)},${an2Y - R - 8} L ${side},${an2Y - R - 2}`,
    fill: 'none', stroke: tokens[t].bg + '0.12)', 'stroke-width': 1.2, 'stroke-dasharray': '4,3'
  });
}

// Edges from FFN Layer 2 to Add&Norm 2
for (let t = 0; t < 3; t++) {
  oneToOneEdges(tokenNodes(tokens[t], ffn2Y), tokenNodes(tokens[t], an2Y), tokens[t].bg + '0.2)', 1);
  dimOffsets.forEach((dx, i) => {
    node(tokens[t].cx + dx, an2Y, 'rgba(255,152,0,0.12)', '#ff9800', an2Vecs[t][i], '#ffb74d');
  });
}

// End transformer block label
Y += 48;
label(470, Y, 'Block output - feeds into next block (96 total)', 'rgba(255,255,255,0.3)', 11, '600');

// ============================
// OUTPUT PROJECTION (last token only)
// ============================
Y += 60;
el('rect', { x: 620, y: Y - 6, width: 280, height: 300, rx: 12, fill: 'rgba(156,120,255,0.02)', stroke: 'rgba(156,120,255,0.12)', 'stroke-width': 1.5, 'stroke-dasharray': '6,4' });
label(760, Y + 14, 'Output Head (last token only)', '#b8a9ff', 13, '700');

// Arrow from last block cats -> output
Y += 38;
layerLabel(Y, 'Linear Projection (learned)', '#b8a9ff');
Y += 40;
const outY = Y;

// Last token's 3 dims -> 5 vocab neurons (fully connected)
const vocabWords = ['"the"', '"a"', '"are"', '"cute"', '"run"'];
const vocabX = [670, 710, 750, 790, 830];
const vocabScores = [1.2, 0.2, 3.8, 2.1, -0.5];

// Edges from cats dims to vocab nodes
for (const dx of dimOffsets) {
  for (const vx of vocabX) {
    edge(tokens[2].cx + dx, an2Y + R, vx, outY - R, 'rgba(156,120,255,0.15)', 0.7);
  }
}

// Vocab score nodes
vocabX.forEach((vx, i) => {
  node(vx, outY, 'rgba(156,120,255,0.12)', '#9c78ff', vocabScores[i], '#b8a9ff');
  label(vx, outY - 20, vocabWords[i], 'rgba(255,255,255,0.35)', 9, '600');
});

// --- Softmax ---
Y += 64;
layerLabel(Y, 'Softmax (pure math)', 'rgba(255,255,255,0.5)');
Y += 40;
const smY = Y;
const probs = ['4.1%', '1.5%', '56.2%', '10.0%', '0.7%'];
const probColors = ['rgba(255,255,255,0.3)', 'rgba(255,255,255,0.3)', '#80e8a5', 'rgba(255,255,255,0.3)', 'rgba(255,255,255,0.3)'];

vocabX.forEach((vx, i) => {
  edge(vx, outY + R, vx, smY - R, 'rgba(255,255,255,0.12)', 0.8);
  const isWinner = i === 2;
  node(vx, smY, isWinner ? 'rgba(76,175,80,0.2)' : 'rgba(255,255,255,0.05)',
       isWinner ? '#4caf50' : 'rgba(255,255,255,0.2)', probs[i], probColors[i]);
});

// --- Prediction ---
Y += 56;
el('rect', { x: 720, y: Y - 4, width: 60, height: 30, rx: 10, fill: 'rgba(76,175,80,0.2)', stroke: '#4caf50', 'stroke-width': 2 });
label(750, Y + 16, '"are"', '#80e8a5', 14, '700');

// Arrow from softmax winner to prediction
edge(750, smY + R, 750, Y - 6, 'rgba(76,175,80,0.4)', 1.5);

// Final label
Y += 50;
label(750, Y, 'Prediction: "I love cats are..."', 'rgba(255,255,255,0.3)', 11, '600');

// ============================
// LEGEND
// ============================
Y += 46;
el('rect', { x: 30, y: Y, width: 880, height: 120, rx: 10, fill: 'rgba(255,255,255,0.02)', stroke: 'rgba(255,255,255,0.08)', 'stroke-width': 1 });
label(470, Y + 20, 'Legend', 'rgba(255,255,255,0.5)', 13, '700');

// NN layers
node(60, Y + 46, 'rgba(0,188,212,0.15)', '#00bcd4', '', '', 8);
label(76, Y + 50, 'Learned NN layer (weights trained via backpropagation)', 'rgba(255,255,255,0.4)', 10, '400', 'start');

// Pure math
node(60, Y + 72, 'rgba(255,255,255,0.05)', 'rgba(255,255,255,0.2)', '', '', 8);
label(76, Y + 76, 'Pure math operation (no learned parameters)', 'rgba(255,255,255,0.4)', 10, '400', 'start');

// Skip connection
el('line', { x1: 50, y1: Y + 96, x2: 70, y2: Y + 96, stroke: 'rgba(255,255,255,0.2)', 'stroke-width': 1.5, 'stroke-dasharray': '4,3' });
label(76, Y + 100, 'Residual skip connection (input added back to output)', 'rgba(255,255,255,0.4)', 10, '400', 'start');

// Token colors
node(500, Y + 46, 'rgba(244,67,54,0.15)', '#f44336', '', '', 8);
label(514, Y + 50, '"I" = [1, 2, 3]', '#ef9a9a', 10, '600', 'start');
